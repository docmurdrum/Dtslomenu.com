<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="checkout-btn" onclick="toggleCheckout()">🛒 Checkout (<span id="cart-count">0</span>)</button>

    <div id="store-page">
        <h1>Our Products</h1>
        <div class="product-grid" id="product-grid"></div>
    </div>

    <div id="checkout-page" style="display:none;">
        <h1>Checkout</h1>
        <div id="order-summary"></div>
        <hr>
        <form id="order-form">
            <input type="text" id="fname" placeholder="First Name" required>
            <input type="text" id="lname" placeholder="Last Initial" maxlength="1" required>
            <input type="tel" id="phone" placeholder="Your Phone Number" required>
            <p><small>*Location access will be requested to complete order.</small></p>
            <button type="button" onclick="submitOrder()">Send Order via SMS</button>
            <button type="button" onclick="toggleCheckout()" class="back-btn">Back to Store</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
