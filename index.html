<script>
    // INVENTORY LIST: Change 'true' to 'false' to hide an item instantly
    const products = [
        { name: "Mini water", size: "8oz", price: 0.99, available: true },
        { name: "Waterloo", size: "12oz", price: 1.49, available: true },
        { name: "Mini soda", size: "8oz", price: 1.99, available: true },
        { name: "Milk", size: "16oz", price: 1.99, available: true },
        { name: "Coffee", size: "12oz", price: 2.99, available: true },
        { name: "Redbull", size: "8.4oz", price: 3.99, available: true },
        { name: "Protein drink", size: "14oz", price: 2.99, available: true },
        { name: "Coconut water", size: "11oz", price: 2.99, available: true },
        { name: "Mints or gum", size: "1 pack", price: 2.99, available: true },
        { name: "Welches fruit snacks", size: "2.25oz", price: 0.99, available: true },
        { name: "Pistachios", size: "1.5oz", price: 1.99, available: true },
        { name: "Chips", size: "1 bag", price: 1.99, available: true },
        { name: "A dozen oreos", size: "12 count", price: 2.99, available: true },
        { name: "Liquid IV", size: "1 stick", price: 2.99, available: true },
        { name: "Rose", size: "1 stem", price: 3.99, available: true },
        { name: "Charger", size: "1 unit", price: 9.99, available: true }
    ];

    let cart = {};

    function updateQty(name, change) {
        const el = document.getElementById(`qty-${name}`);
        let val = parseInt(el.innerText) + change;
        if (val < 1) val = 1;
        el.innerText = val;
    }

    function renderProducts() {
        const grid = document.getElementById('product-grid');
        if(!grid) return;
        grid.innerHTML = ""; // Clear grid before rendering

        // This line filters out anything marked 'false'
        const availableItems = products.filter(p => p.available === true);

        availableItems.forEach(p => {
            const idName = p.name.replace(/\s+/g, '-');
            grid.innerHTML += `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p>${p.size}</p>
                    <p class="price">$${p.price.toFixed(2)}</p>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${idName}', -1)">-</button>
                        <span class="qty-amount" id="qty-${idName}">1</span>
                        <button class="qty-btn" onclick="updateQty('${idName}', 1)">+</button>
                    </div>
                    <button class="add-btn" onclick="addToCart('${p.name}', '${idName}', ${p.price})">Add to Cart</button>
                </div>`;
        });
    }

    // ... (rest of your existing addToCart, toggleCheckout, and submitOrder functions) ...

    function addToCart(actualName, idName, price) {
        const qty = parseInt(document.getElementById(`qty-${idName}`).innerText);
        cart[actualName] = (cart[actualName] || 0) + qty;
        document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b)=>a+b,0);
        document.getElementById(`qty-${idName}`).innerText = 1;
    }

    function toggleCheckout() {
        const s = document.getElementById('store-page');
        const c = document.getElementById('checkout-page');
        if(s.style.display === "none") {
            s.style.display = "block"; c.style.display = "none";
            window.scrollTo(0,0);
        } else {
            if(Object.keys(cart).length === 0) return alert("Your cart is empty!");
            s.style.display = "none"; c.style.display = "block";
            window.scrollTo(0,0);
            const summ = document.getElementById('order-summary');
            let h = "<ul>"; let t = 0;
            for(let i in cart) { 
                const p = products.find(x=>x.name===i);
                h += `<li><span>${i} (x${cart[i]})</span> <span>$${(p.price*cart[i]).toFixed(2)}</span></li>`;
                t += p.price*cart[i];
            }
            summ.innerHTML = h + "</ul><div style='display:flex; justify-content:space-between; font-weight:bold; margin-top:15px; font-size:1.2rem;'><span>Total:</span><span>$" + t.toFixed(2) + "</span></div>";
        }
    }

    function submitOrder() {
        const fn = document.getElementById('fname').value;
        const ln = document.getElementById('lname').value;
        const ph = document.getElementById('phone').value;
        if(!fn || !ph) return alert("Please provide your name and phone number!");

        navigator.geolocation.getCurrentPosition(pos => {
            const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            let items = ""; for(let i in cart) { items += `${i}(${cart[i]}) `; }
            const msg = `New Order: ${fn} ${ln}. Phone: ${ph}. Items: ${items} Location: ${map}`;
            window.location.href = `sms:+18052506655?&body=${encodeURIComponent(msg)}`;
        }, () => alert("Location is required for delivery! Please enable GPS."));
    }

    renderProducts();
</script>
