<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; background:#f5f7fa; }

.navbar {
    position:fixed; top:0; left:0; right:0;
    height:60px; background:#111; color:white;
    display:flex; align-items:center;
    padding:0 15px; z-index:2000;
}

.menu-btn { font-size:22px; }
#player-info { margin-left:10px; font-size:14px; }
#leaderboard { margin-left:auto; font-size:12px; }

.page { padding-top:80px; }

.bar {
    background:white; margin:15px; padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.status { font-weight:bold; margin:10px 0; }

.buttons button {
    margin:4px;
    padding:8px 10px;
    border:none;
    border-radius:10px;
    font-size:12px;
}

.confirm-btn {
    background:#eee;
}

#xp-bar {
    position:fixed;
    bottom:0; left:0;
    height:6px;
    background:#28a745;
    width:0%;
    transition:width 0.3s;
}

.xp-float {
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:#28a745;
    font-weight:bold;
    animation:floatUp 1s forwards;
}
@keyframes floatUp {
    0%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-40px);}
}
</style>
</head>

<body>

<div class="navbar">
    <div class="menu-btn">☰</div>
    <div id="player-info">Lv 1 • Rookie</div>
    <div id="leaderboard">🏆 0 reports</div>
</div>

<div id="line" class="page"></div>
<div id="xp-bar"></div>

<script>
/* 📍 INSERT KEY (Line ~65) */
const supabaseClient = window.supabase.createClient(
"https://jwgwufggptpdmgcmmqes.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Z3d1ZmdncHRwZG1nY21tcWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTExNTAsImV4cCI6MjA4OTYyNzE1MH0.mzbgdrq10Y203l1-oj-m4WjoQs9Z3KgsrFoEU24lV18"
);

/* DATA */
var bars = [
    {name:"Library", reports:[]},
    {name:"Mothers Tavern", reports:[]},
    {name:"Frog & Peach", reports:[]}
];

var xp = 0;
var level = 1;
var totalReports = parseInt(localStorage.getItem("reports")) || 0;

/* CHECK-IN */
var lastCheckInDate = localStorage.getItem("checkinDate") || "";
var today = new Date().toDateString();
var firstCheckInDone = (lastCheckInDate === today);

/* TITLE */
function getTitle(){
    if(level < 3) return "Rookie";
    if(level < 6) return "Local";
    if(level < 10) return "Regular";
    return "Nightlife Legend";
}

function updatePlayerUI(){
    document.getElementById("player-info").innerText =
        `Lv ${level} • ${getTitle()}`;
}

function updateLeaderboardUI(){
    document.getElementById("leaderboard").innerText =
        `🏆 ${totalReports} reports`;
}

/* XP FLOAT */
function showXP(text){
    let el=document.createElement("div");
    el.className="xp-float";
    el.innerText=text;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

/* LEVEL */
function checkLevelUp(){
    let required = level * 100;
    if(xp >= required){
        level++;
        xp -= required;
        showXP("🎉 LEVEL UP!");
    }
}

/* 📍 CHECK-IN */
function checkIn(){
    let bonus = firstCheckInDone ? 15 : 25;
    xp += bonus;

    if(!firstCheckInDone){
        firstCheckInDone = true;
        localStorage.setItem("checkinDate", today);
    }

    showXP(`+${bonus} XP 📍`);
    updateBar();
}

/* ✅ CONFIRM */
function confirmStatus(status){
    xp += 5;
    showXP(`+5 XP ✔️`);
    updateBar();
}

/* REPORT */
async function report(i,status){
    try {
        await supabaseClient.from("reports").insert([
            {bar: bars[i].name, status: status}
        ]);
    } catch(e){ console.log(e); }

    xp += 10;

    totalReports++;
    localStorage.setItem("reports", totalReports);
    updateLeaderboardUI();

    showXP("+10 XP");

    loadReports();
}

/* UPDATE UI */
function updateBar(){
    document.getElementById("xp-bar").style.width = (xp % 100) + "%";
    checkLevelUp();
    updatePlayerUI();
}

/* STATUS */
function getStatus(bar){
    if(bar.reports.length===0) return "No Data";
    let recent = bar.reports.slice(0,5);
    let counts = {};
    recent.forEach(r=>{
        counts[r.status]=(counts[r.status]||0)+1;
    });
    return Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b);
}

/* RENDER */
function renderBars(){
    let container=document.getElementById("line");
    container.innerHTML="";

    bars.forEach((bar,i)=>{
        let status=getStatus(bar);

        container.innerHTML+=`
        <div class="bar">
            <h3>${bar.name}</h3>
            <div class="status">${status}</div>

            <div class="buttons">
                <button onclick="report(${i},'Dead')">Dead</button>
                <button onclick="report(${i},'Busy')">Busy</button>
                <button onclick="report(${i},'Packed')">Packed</button>
                <button onclick="checkIn()">📍 I'm Here</button>
            </div>

            <div class="buttons">
                <button class="confirm-btn" onclick="confirmStatus('Dead')">Still Dead</button>
                <button class="confirm-btn" onclick="confirmStatus('Busy')">Still Busy</button>
                <button class="confirm-btn" onclick="confirmStatus('Packed')">Still Packed</button>
            </div>
        </div>`;
    });
}

/* LOAD */
async function loadReports(){
    try {
        const {data} = await supabaseClient
            .from("reports")
            .select("*")
            .order("created_at",{ascending:false});

        bars.forEach(b=>b.reports=[]);

        data.forEach(r=>{
            let b = bars.find(x=>x.name===r.bar);
            if(b){
                b.reports.push({status:r.status});
            }
        });

    } catch(e){ console.log(e); }

    renderBars();
}

/* INIT */
window.onload=function(){
    renderBars();
    loadReports();
    updateLeaderboardUI();
};
</script>

</body>
</html>
