<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

/* Auth Screen */
#auth-screen {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.auth-box {
  background: #1a1a2e;
  padding: 25px;
  border-radius: 10px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #ff2d78;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #ff4d90;
}

.auth-error {
  margin-top: 10px;
  display: none;
}

/* App */
#app {
  display: none;
  padding: 20px;
}
</style>
</head>

<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">

    <h2>Login</h2>

    <form id="login-form">
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <hr>

    <h3>Sign Up</h3>

    <form id="signup-form">
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <div class="auth-error"></div>

  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <h1>Welcome 🎉</h1>
  <p>You are logged in.</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
// 🔑 REPLACE THESE
const SUPABASE_URL = "https://jwgwufggptpdmgcmmqes.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Z3d1ZmdncHRwZG1nY21tcWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTExNTAsImV4cCI6MjA4OTYyNzE1MH0.mzbgdrq10Y203l1-oj-m4WjoQs9Z3KgsrFoEU24lV18";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// UI
const authScreen = document.getElementById("auth-screen");
const app = document.getElementById("app");
const loginForm = document.getElementById("login-form");
const signupForm = document.getElementById("signup-form");
const errorBox = document.querySelector(".auth-error");

// SIGNUP
signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = signupForm.email.value;
  const password = signupForm.password.value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) {
    showError(error.message);
  } else {
    showError("Check your email to confirm signup", true);
  }
});

// LOGIN
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = loginForm.email.value;
  const password = loginForm.password.value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password,
  });

  if (error) {
    showError(error.message);
  }
});

// LOGOUT
function logout() {
  supabase.auth.signOut();
}

// SESSION HANDLER
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    authScreen.style.display = "none";
    app.style.display = "block";
  } else {
    authScreen.style.display = "flex";
    app.style.display = "none";
  }
});

// INITIAL CHECK
(async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    authScreen.style.display = "none";
    app.style.display = "block";
  }
})();

// ERROR UI
function showError(msg, success = false) {
  errorBox.style.display = "block";
  errorBox.textContent = msg;
  errorBox.style.color = success ? "#00ff88" : "#ff2d78";
}
</script>

</body>
</html>
