<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DTSLO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root[data-theme="dark"] {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #f0f0f5;
    --text2: #8888a0;
    --accent: #7c6af7;
    --accent2: #5b4fcc;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --nav-h: 64px;
  }
  :root[data-theme="light"] {
    --bg: #f5f5fa;
    --surface: #ffffff;
    --surface2: #f0f0f8;
    --border: #e0e0ec;
    --text: #111118;
    --text2: #666680;
    --accent: #7c6af7;
    --accent2: #5b4fcc;
    --green: #16a34a;
    --yellow: #d97706;
    --red: #dc2626;
    --nav-h: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    animation: fadeIn 0.35s ease;
  }

  .auth-logo {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .auth-tagline {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 28px;
  }

  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .auth-tab {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .auth-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .auth-form { display: flex; flex-direction: column; gap: 10px; }

  .input-group { display: flex; flex-direction: column; gap: 5px; }
  .input-label { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.3px; text-transform: uppercase; }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 13px 14px;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }
  .form-textarea { resize: vertical; min-height: 80px; }

  .auth-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: var(--red);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
  }

  /* ── NAV ── */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    z-index: 2000;
    gap: 4px;
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-right: auto;
  }

  .nav-btn {
    background: transparent;
    color: var(--text2);
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: white; }
  .nav-btn .icon { font-size: 15px; }

  .avatar-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--accent);
    color: white;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-left: 4px;
    flex-shrink: 0;
  }
  .avatar-btn:hover { border-color: var(--accent); transform: scale(1.07); }

  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--border); }

  /* ── PAGES ── */
  #app { display: none; }

  .page {
    display: none;
    padding: calc(var(--nav-h) + 16px) 16px 32px;
    max-width: 640px;
    margin: 0 auto;
    animation: fadeIn 0.25s ease;
  }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 14px;
  }

  /* ── BAR CARDS ── */
  .bar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .bar-card:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

  .bar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .bar-name { font-size: 17px; font-weight: 700; }
  .bar-time { font-size: 12px; color: var(--text2); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600; margin-bottom: 12px;
  }
  .status-Dead   { background: rgba(34,197,94,0.15);  color: var(--green); }
  .status-Busy   { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status-Packed { background: rgba(239,68,68,0.15);  color: var(--red); }
  .status-NoData { background: var(--surface2); color: var(--text2); }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  .vote-row { display: flex; gap: 8px; }
  .vote-btn {
    flex: 1; padding: 9px 0;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.18s;
  }
  .vote-btn:active { transform: scale(0.96); }
  .vote-btn.dead:hover   { border-color: var(--green);  color: var(--green);  background: rgba(34,197,94,0.08); }
  .vote-btn.busy:hover   { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,0.08); }
  .vote-btn.packed:hover { border-color: var(--red);    color: var(--red);    background: rgba(239,68,68,0.08); }

  /* ── PRODUCTS ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 80px;
  }
  .product-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; text-align: center;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .product-emoji { font-size: 32px; margin-bottom: 8px; }
  .product-name  { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .product-price { font-size: 13px; color: var(--text2); margin-bottom: 12px; }

  .add-btn {
    width: 100%; padding: 8px;
    background: var(--accent); color: white;
    border: none; border-radius: 10px;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
  }
  .add-btn:hover { background: var(--accent2); }
  .add-btn:active { transform: scale(0.96); }

  /* ── CART FAB ── */
  .cart-fab {
    position: fixed; bottom: 24px; right: 16px;
    background: var(--accent); color: white;
    border: none; padding: 14px 22px;
    border-radius: 50px; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px; z-index: 1500;
  }
  .cart-fab:hover { background: var(--accent2); transform: translateY(-2px); }
  .cart-fab:active { transform: scale(0.96); }
  .cart-badge {
    background: white; color: var(--accent);
    border-radius: 12px; padding: 1px 8px;
    font-size: 13px; font-weight: 800;
  }

  /* ── LOST & FOUND ── */
  .lf-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .post-btn {
    background: var(--accent); color: white;
    border: none; padding: 10px 18px;
    border-radius: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .post-btn:hover { background: var(--accent2); }
  .lf-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 10px;
    transition: transform 0.15s;
  }
  .lf-card:hover { transform: translateY(-1px); }
  .lf-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700; margin-bottom: 8px;
  }
  .lf-lost  { background: rgba(239,68,68,0.15); color: var(--red); }
  .lf-found { background: rgba(34,197,94,0.15);  color: var(--green); }
  .lf-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .lf-meta  { font-size: 13px; color: var(--text2); }
  .lf-desc  { font-size: 14px; margin-top: 8px; line-height: 1.5; }
  .lf-contact {
    margin-top: 10px; padding: 8px 12px;
    background: var(--surface2); border-radius: 10px;
    font-size: 13px; color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }

  /* ── PROFILE PAGE ── */
  .profile-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 18px;
  }

  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: white;
    flex-shrink: 0; border: 3px solid var(--border);
  }

  .profile-info { flex: 1; min-width: 0; }
  .profile-username {
    font-size: 20px; font-weight: 800; letter-spacing: -0.4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .profile-email  { font-size: 13px; color: var(--text2); margin-bottom: 5px; }
  .profile-joined { font-size: 12px; color: var(--text2); }

  .xp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 20px; margin-bottom: 12px;
  }
  .xp-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .xp-title { font-size: 14px; font-weight: 700; }
  .xp-level {
    font-size: 12px; font-weight: 700; color: white;
    background: var(--accent); padding: 2px 10px; border-radius: 20px;
  }
  .xp-track {
    height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;
  }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1);
  }
  .xp-sub { font-size: 12px; color: var(--text2); margin-top: 7px; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 12px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 10px; text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

  .profile-section-label {
    font-size: 11px; font-weight: 700; color: var(--text2);
    letter-spacing: 0.8px; text-transform: uppercase;
    margin: 18px 0 8px 4px;
  }

  .profile-action {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 15px 18px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.18s;
    width: 100%; text-align: left;
    color: var(--text); font-family: inherit; font-size: 15px;
  }
  .profile-action:hover { background: var(--surface2); }
  .profile-action .pa-icon { font-size: 18px; }
  .profile-action .pa-label { font-size: 15px; font-weight: 600; flex: 1; }
  .profile-action .pa-arrow { color: var(--text2); font-size: 16px; }
  .profile-action.danger { color: var(--red); }
  .profile-action.danger .pa-arrow { color: rgba(239,68,68,0.5); }

  /* ── CHANGE PW INLINE ── */
  .change-pw-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
    margin-bottom: 8px; display: none;
    animation: fadeIn 0.2s ease;
  }
  .change-pw-box.open { display: block; }
  .change-pw-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text2); }

  /* ── MODALS ── */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 3000; backdrop-filter: blur(4px);
  }
  .modal.open { display: flex; }

  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    padding: 24px; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 520px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; letter-spacing: -0.4px; }

  .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--accent); color: white;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    width: 100%; padding: 13px;
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border); border-radius: 14px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .btn-secondary:hover { color: var(--text); background: var(--border); }

  .order-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 15px;
  }
  .order-item:last-child { border-bottom: none; }
  .order-total {
    display: flex; justify-content: space-between;
    padding: 12px 0 4px; font-weight: 800; font-size: 16px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 12px 20px; border-radius: 50px;
    font-size: 14px; font-weight: 600; z-index: 9999;
    opacity: 0; transition: all 0.3s;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MISC ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-msg  { font-size: 15px; }
  .loader { display: flex; justify-content: center; padding: 32px; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* ── CHARACTER CARD ── */
  .char-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 12px;
    text-align: center;
  }
  .char-img-wrap {
    position: relative;
    width: 160px; height: 160px;
    margin: 0 auto 14px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--accent);
    background: var(--surface2);
  }
  .char-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .char-img-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 48px; color: var(--text2);
    gap: 4px;
  }
  .char-img-placeholder span {
    font-size: 11px; color: var(--text2); font-weight: 600;
  }
  .char-generating {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
  }
  .char-name {
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.4px; margin-bottom: 4px;
  }
  .char-archetype {
    font-size: 13px; color: var(--text2);
    margin-bottom: 14px; font-style: italic;
  }
  .char-tier-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white; padding: 4px 14px;
    border-radius: 20px; font-size: 12px; font-weight: 700;
    margin-bottom: 14px;
  }
  .char-traits {
    display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: center; margin-bottom: 16px;
  }
  .char-trait {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
    font-size: 11px; color: var(--text2); font-weight: 600;
  }
  .char-actions {
    display: flex; gap: 8px; justify-content: center;
  }
  .char-btn {
    flex: 1; max-width: 160px;
    padding: 10px; border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .char-btn:hover { border-color: var(--accent); color: var(--accent); }
  .char-btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .char-btn.primary:hover { background: var(--accent2); }
  .char-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hf-key-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
  }
  .hf-key-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text2); }
  .hf-key-row { display: flex; gap: 8px; }
  .hf-key-row input { flex: 1; }
  .hf-key-row button {
    padding: 10px 14px; border-radius: 10px;
    background: var(--accent); color: white; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }

  @media (max-width: 480px) {
    .nav-btn span.label { display: none; }
    .nav-logo { font-size: 16px; }
    .product-grid { grid-template-columns: repeat(2, 1fr); }
    .auth-card { padding: 28px
