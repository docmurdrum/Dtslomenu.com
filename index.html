<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; background:#f5f7fa; font-family:sans-serif; }

/* NAV */
.navbar {
    position:fixed; top:0; left:0; right:0;
    height:60px; background:#111; color:white;
    display:flex; align-items:center; padding:0 15px;
}

/* 🔥 TRENDING */
#trending-banner {
    position:fixed;
    top:60px;
    left:0;
    right:0;
    background:#ff4757;
    color:white;
    text-align:center;
    padding:10px;
    font-weight:bold;
    display:none;
    z-index:1000;
}

/* PAGES */
.page { display:none; padding-top:110px; }
.active { display:block; }

/* BARS */
.bar {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
}

/* STATUS */
.status { font-weight:bold; }
.dead { color:#28a745; }
.busy { color:#ffc107; }
.packed { color:#dc3545; }

/* BUTTONS */
button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
}

/* XP */
#xp-bar {
    position:fixed;
    bottom:0;
    height:6px;
    background:#28a745;
    width:0%;
}
</style>
</head>

<body>

<div class="navbar">☰ DTSLO</div>

<!-- 🔥 TRENDING -->
<div id="trending-banner"></div>

<div id="line" class="page active"></div>

<div id="xp-bar"></div>

<script>
const supabaseClient = window.supabase.createClient(
"https://jwgwufggptpdmgcmmqes.supabase.co",
"YOUR_KEY"
);

var bars = [
    {name:"Library", reports:[]},
    {name:"Mothers Tavern", reports:[]},
    {name:"Frog & Peach", reports:[]}
];

var xp=0;

/* STATUS */
function getStatus(bar){
    if(bar.reports.length===0) return "No Data";
    let recent = bar.reports.slice(0,5);
    let counts={};
    recent.forEach(r=>{
        counts[r.status]=(counts[r.status]||0)+1;
    });
    return Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b);
}

/* 🔥 TRENDING FUNCTION */
function updateTrending(){
    let now = Date.now();
    let counts = {};

    bars.forEach(bar=>{
        let recent = bar.reports.filter(r => now - r.time < 1800000);
        counts[bar.name] = recent.length;
    });

    let topBar=null, max=0;

    for(let b in counts){
        if(counts[b]>max){
            max=counts[b];
            topBar=b;
        }
    }

    let banner=document.getElementById("trending-banner");

    if(max>0){
        banner.style.display="block";
        banner.innerText=`🔥 ${topBar} is HOT right now (${max} reports)`;
    } else {
        banner.style.display="none";
    }
}

/* RENDER */
function renderBars(){
    let container=document.getElementById("line");
    container.innerHTML="";

    bars.forEach((bar,i)=>{
        let status=getStatus(bar);
        container.innerHTML+=`
        <div class="bar">
            <h3>${bar.name}</h3>
            <div class="status">${status}</div>
            <button onclick="report(${i},'Dead')">Dead</button>
            <button onclick="report(${i},'Busy')">Busy</button>
            <button onclick="report(${i},'Packed')">Packed</button>
        </div>`;
    });
}

/* REPORT */
async function report(i,status){
    await supabaseClient.from("reports").insert([
        {bar: bars[i].name, status: status}
    ]);

    xp+=10;
    document.getElementById("xp-bar").style.width=(xp%100)+"%";

    loadReports();
}

/* LOAD */
async function loadReports(){
    const {data} = await supabaseClient
        .from("reports")
        .select("*")
        .order("created_at",{ascending:false});

    bars.forEach(b=>b.reports=[]);

    data.forEach(r=>{
        let b=bars.find(x=>x.name===r.bar);
        if(b){
            b.reports.push({
                status:r.status,
                time:new Date(r.created_at).getTime()
            });
        }
    });

    renderBars();
    updateTrending(); // 🔥 HERE IT RUNS
}

/* INIT */
window.onload=function(){
    loadReports();
    setInterval(loadReports,5000);
};
</script>

</body>
</html>
