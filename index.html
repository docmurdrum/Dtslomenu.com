<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DTSLO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root[data-theme="dark"] {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #f0f0f5;
    --text2: #8888a0;
    --accent: #7c6af7;
    --accent2: #5b4fcc;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --nav-h: 64px;
  }
  :root[data-theme="light"] {
    --bg: #f5f5fa;
    --surface: #ffffff;
    --surface2: #f0f0f8;
    --border: #e0e0ec;
    --text: #111118;
    --text2: #666680;
    --accent: #7c6af7;
    --accent2: #5b4fcc;
    --green: #16a34a;
    --yellow: #d97706;
    --red: #dc2626;
    --nav-h: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── NAV ── */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    z-index: 2000;
    gap: 6px;
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-right: auto;
  }

  .nav-btn {
    background: transparent;
    color: var(--text2);
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active {
    background: var(--accent);
    color: white;
  }
  .nav-btn .icon { font-size: 16px; }

  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-left: 4px;
  }
  .theme-toggle:hover { background: var(--border); }

  /* ── PAGES ── */
  .page {
    display: none;
    padding: calc(var(--nav-h) + 16px) 16px 24px;
    max-width: 640px;
    margin: 0 auto;
    animation: fadeIn 0.25s ease;
  }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 14px;
    color: var(--text);
  }

  /* ── BAR CARDS ── */
  .bar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .bar-card:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

  .bar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .bar-name { font-size: 17px; font-weight: 700; }
  .bar-time { font-size: 12px; color: var(--text2); }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .status-Dead   { background: rgba(239,68,68,0.15); color: var(--red); }
  .status-Busy   { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status-Packed { background: rgba(239,68,68,0.2); color: #f87171; }
  .status-NoData { background: var(--surface2); color: var(--text2); }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  .vote-row {
    display: flex; gap: 8px;
  }
  .vote-btn {
    flex: 1;
    padding: 9px 0;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }
  .vote-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.08); }
  .vote-btn:active { transform: scale(0.96); }
  .vote-btn.dead:hover   { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .vote-btn.busy:hover   { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,0.08); }
  .vote-btn.packed:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

  /* ── PRODUCTS ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 80px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

  .product-emoji { font-size: 32px; margin-bottom: 8px; }
  .product-name  { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .product-price { font-size: 13px; color: var(--text2); margin-bottom: 12px; }

  .add-btn {
    width: 100%;
    padding: 8px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .add-btn:hover { background: var(--accent2); }
  .add-btn:active { transform: scale(0.96); }

  /* ── CART FAB ── */
  .cart-fab {
    position: fixed;
    bottom: 24px;
    right: 16px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 22px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
    z-index: 1500;
  }
  .cart-fab:hover { background: var(--accent2); transform: translateY(-2px); }
  .cart-fab:active { transform: scale(0.96); }

  .cart-badge {
    background: white;
    color: var(--accent);
    border-radius: 12px;
    padding: 1px 8px;
    font-size: 13px;
    font-weight: 800;
  }

  /* ── LOST & FOUND ── */
  .lf-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }

  .post-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .post-btn:hover { background: var(--accent2); }

  .lf-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    transition: transform 0.15s;
  }
  .lf-card:hover { transform: translateY(-1px); }

  .lf-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .lf-lost  { background: rgba(239,68,68,0.15); color: var(--red); }
  .lf-found { background: rgba(34,197,94,0.15); color: var(--green); }

  .lf-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .lf-meta  { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .lf-desc  { font-size: 14px; color: var(--text); margin-top: 8px; line-height: 1.5; }
  .lf-contact {
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }

  /* ── MODALS ── */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 3000;
    backdrop-filter: blur(4px);
  }
  .modal.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 520px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 20px; font-weight: 800;
    margin-bottom: 18px; letter-spacing: -0.4px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 13px 14px;
    border-radius: 12px;
    font-size: 15px;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 80px; }

  .modal-actions {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 4px;
  }

  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--accent); color: white;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    width: 100%; padding: 13px;
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border); border-radius: 14px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-secondary:hover { color: var(--text); background: var(--border); }

  .order-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }
  .order-item:last-child { border-bottom: none; }

  .order-total {
    display: flex; justify-content: space-between;
    padding: 12px 0 4px;
    font-weight: 800;
    font-size: 16px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-msg  { font-size: 15px; }

  /* ── LOADER ── */
  .loader {
    display: flex; justify-content: center; padding: 32px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .nav-btn span.label { display: none; }
    .nav-logo { font-size: 16px; }
    .product-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-logo">DTSLO</div>
  <button class="nav-btn active" id="nav-line" onclick="showPage('line')">
    <span class="icon">📍</span><span class="label">Lines</span>
  </button>
  <button class="nav-btn" id="nav-delivery" onclick="showPage('delivery')">
    <span class="icon">🛒</span><span class="label">Delivery</span>
  </button>
  <button class="nav-btn" id="nav-lost" onclick="showPage('lost')">
    <span class="icon">🔍</span><span class="label">Lost</span>
  </button>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
</nav>

<!-- LINES PAGE -->
<div id="line" class="page active">
  <div class="section-title">Bar Lines</div>
  <div id="bars"></div>
</div>

<!-- DELIVERY PAGE -->
<div id="delivery" class="page">
  <div class="section-title">Quick Delivery</div>
  <div id="product-grid" class="product-grid"></div>
  <button class="cart-fab" id="cart-fab" onclick="openCheckout()" style="display:none">
    🛒 Cart <span class="cart-badge" id="cart-count">0</span>
  </button>
</div>

<!-- LOST PAGE -->
<div id="lost" class="page">
  <div class="lf-header">
    <div class="section-title" style="margin:0">Lost & Found</div>
    <button class="post-btn" onclick="openLostModal()">+ Post Item</button>
  </div>
  <div id="lost-feed"></div>
</div>

<!-- CHECKOUT MODAL -->
<div id="checkout-modal" class="modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Your Order</div>
    <div id="order-summary"></div>
    <div class="order-total"><span>Total</span><span id="order-total">$0.00</span></div>
    <br>
    <input id="name" class="form-input" placeholder="Your name">
    <input id="phone" class="form-input" placeholder="Phone number" type="tel">
    <div class="modal-actions">
      <button class="btn-primary" onclick="placeOrder()">Place Order</button>
      <button class="btn-secondary" onclick="closeCheckout()">Cancel</button>
    </div>
  </div>
</div>

<!-- LOST MODAL -->
<div id="lost-modal" class="modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Post an Item</div>
    <select id="lf-type" class="form-select">
      <option value="lost">🔴 Lost something</option>
      <option value="found">🟢 Found something</option>
    </select>
    <input id="lf-title" class="form-input" placeholder="Item name">
    <input id="lf-location" class="form-input" placeholder="Location (where lost/found)">
    <input id="lf-contact" class="form-input" placeholder="Contact info">
    <textarea id="lf-description" class="form-textarea" placeholder="Additional details..."></textarea>
    <div class="modal-actions">
      <button class="btn-primary" onclick="submitLostItem()">Post Item</button>
      <button class="btn-secondary" onclick="closeLostModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://jwgwufggptpdmgcmmqes.supabase.co",
  "YOUR_KEY_HERE"
);

/* ── THEME ── */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── NAV ── */
function showPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
  document.getElementById('nav-' + p).classList.add('active');
}

/* ── DATA ── */
const bars = [
  { name: 'Library',       emoji: '📚', reports: [] },
  { name: "Mother's Tavern", emoji: '🍺', reports: [] },
  { name: 'Frog & Peach',  emoji: '🐸', reports: [] }
];

const products = [
  { name: 'Red Bull',  emoji: '⚡', price: 3.99 },
  { name: 'Water',     emoji: '💧', price: 1.99 },
  { name: 'Charger',   emoji: '🔋', price: 14.99 },
  { name: 'Snack',     emoji: '🍫', price: 2.49 }
];

let cart = {};

/* ── TIME ── */
function timeAgo(t) {
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60)  return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60)  return m + 'm ago';
  return Math.floor(m / 60) + 'h ago';
}

/* ── STATUS ── */
function getStatus(bar) {
  if (!bar.reports.length) return 'No Data';
  const counts = {};
  bar.reports.slice(0, 5).forEach(r => {
    counts[r.status] = (counts[r.status] || 0) + 1;
  });
  return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
}

function statusLabel(s) {
  if (s === 'Dead')    return { text: '🟢 Dead (Empty)', cls: 'status-Dead' };
  if (s === 'Busy')    return { text: '🟡 Getting Busy', cls: 'status-Busy' };
  if (s === 'Packed')  return { text: '🔴 Packed', cls: 'status-Packed' };
  return { text: '⚪ No Data', cls: 'status-NoData' };
}

/* ── RENDER BARS ── */
function renderBars() {
  const c = document.getElementById('bars');
  c.innerHTML = '';

  if (!bars.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">🍺</div><div class="empty-msg">No bars found</div></div>`;
    return;
  }

  bars.forEach((bar, i) => {
    const last = bar.reports[0] ? timeAgo(bar.reports[0].time) : 'No data yet';
    const s = getStatus(bar);
    const { text, cls } = statusLabel(s);

    const card = document.createElement('div');
    card.className = 'bar-card';
    card.innerHTML = `
      <div class="bar-header">
        <div class="bar-name">${bar.emoji} ${bar.name}</div>
        <div class="bar-time">Updated ${last}</div>
      </div>
      <div class="status-pill ${cls}"><div class="dot"></div>${text}</div>
      <div class="vote-row">
        <button class="vote-btn dead"   onclick="report(${i},'Dead')">🟢 Dead</button>
        <button class="vote-btn busy"   onclick="report(${i},'Busy')">🟡 Busy</button>
        <button class="vote-btn packed" onclick="report(${i},'Packed')">🔴 Packed</button>
      </div>
    `;
    c.appendChild(card);
  });
}

/* ── LOAD REPORTS ── */
async function loadReports() {
  document.getElementById('bars').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const { data, error } = await supabaseClient
      .from('reports')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    bars.forEach(b => b.reports = []);
    data.forEach(r => {
      const bar = bars.find(b => b.name === r.bar);
      if (bar) bar.reports.push({ status: r.status, time: new Date(r.created_at).getTime() });
    });
  } catch (e) {
    console.error(e);
    showToast('Could not load data');
  }
  renderBars();
}

/* ── REPORT ── */
async function report(i, status) {
  const bar = bars[i];
  // Optimistic update
  bar.reports.unshift({ status, time: Date.now() });
  renderBars();
  try {
    await supabaseClient.from('reports').insert([{ bar: bar.name, status }]);
    showToast('✅ Report submitted — +10 XP');
  } catch (e) {
    console.error(e);
    showToast('❌ Failed to submit report');
  }
}

/* ── PRODUCTS ── */
function renderProducts() {
  const g = document.getElementById('product-grid');
  g.innerHTML = '';
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="product-emoji">${p.emoji}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-price">$${p.price.toFixed(2)}</div>
      <button class="add-btn" onclick="addToCart('${p.name}')">Add to Cart</button>
    `;
    g.appendChild(card);
  });
}

function updateCartUI() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById('cart-count').textContent = total;
  document.getElementById('cart-fab').style.display = total > 0 ? 'flex' : 'none';
}

function addToCart(name) {
  cart[name] = (cart[name] || 0) + 1;
  updateCartUI();
  showToast(`✅ ${name} added to cart`);
}

function openCheckout() {
  const s = document.getElementById('order-summary');
  s.innerHTML = '';
  let total = 0;
  for (const name in cart) {
    const p = products.find(x => x.name === name);
    const lineTotal = p ? p.price * cart[name] : 0;
    total += lineTotal;
    s.innerHTML += `
      <div class="order-item">
        <span>${name} × ${cart[name]}</span>
        <span>$${lineTotal.toFixed(2)}</span>
      </div>`;
  }
  document.getElementById('order-total').textContent = '$' + total.toFixed(2);
  document.getElementById('checkout-modal').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
}

async function placeOrder() {
  const name  = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  if (!name || !phone) { showToast('⚠️ Please fill in your details'); return; }

  const items = Object.entries(cart).map(([k, v]) => `${k} x${v}`).join(', ');
  try {
    await supabaseClient.from('orders').insert([{ name, phone, items }]);
    showToast('🎉 Order placed!');
    cart = {};
    updateCartUI();
    closeCheckout();
  } catch (e) {
    console.error(e);
    showToast('❌ Order failed');
  }
}

/* ── LOST & FOUND ── */
function openLostModal()  { document.getElementById('lost-modal').classList.add('open'); }
function closeLostModal() { document.getElementById('lost-modal').classList.remove('open'); }

async function submitLostItem() {
  const type        = document.getElementById('lf-type').value;
  const title       = document.getElementById('lf-title').value.trim();
  const location    = document.getElementById('lf-location').value.trim();
  const contact     = document.getElementById('lf-contact').value.trim();
  const description = document.getElementById('lf-description').value.trim();

  if (!title) { showToast('⚠️ Please enter item name'); return; }

  try {
    await supabaseClient.from('lost_found').insert([{ type, title, location, contact, description }]);
    showToast('✅ Item posted — +15 XP');
    closeLostModal();
    // Clear form
    ['lf-title','lf-location','lf-contact','lf-description'].forEach(id => document.getElementById(id).value = '');
    loadLostItems();
  } catch (e) {
    console.error(e);
    showToast('❌ Failed to post');
  }
}

async function loadLostItems() {
  const c = document.getElementById('lost-feed');
  c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const { data } = await supabaseClient
      .from('lost_found')
      .select('*')
      .order('created_at', { ascending: false });

    c.innerHTML = '';
    if (!data || !data.length) {
      c.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">No items posted yet</div></div>`;
      return;
    }

    data.forEach(item => {
      const isLost = item.type === 'lost';
      const card = document.createElement('div');
      card.className = 'lf-card';
      card.innerHTML = `
        <div class="lf-tag ${isLost ? 'lf-lost' : 'lf-found'}">
          ${isLost ? '🔴 Lost' : '🟢 Found'}
        </div>
        <div class="lf-title">${item.title}</div>
        <div class="lf-meta">📍 ${item.location || 'Location not specified'} · ${timeAgo(new Date(item.created_at).getTime())}</div>
        ${item.description ? `<div class="lf-desc">${item.description}</div>` : ''}
        ${item.contact ? `<div class="lf-contact">📞 ${item.contact}</div>` : ''}
      `;
      c.appendChild(card);
    });
  } catch (e) {
    console.error(e);
    c.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-msg">Could not load items</div></div>`;
  }
}

/* ── CLOSE MODALS ON BACKDROP CLICK ── */
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.classList.remove('open');
  });
});

/* ── INIT ── */
window.onload = function () {
  renderProducts();
  loadReports();
  loadLostItems();
};
</script>
</body>
