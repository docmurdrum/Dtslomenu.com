<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO Menu</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    background: #f5f7fa;
}

/* HEADER */
.header-container {
    text-align: center;
    padding: 80px 20px 30px;
    background: linear-gradient(135deg, #28a745, #20c997);
    color: white;
}

/* BUTTONS */
#checkout-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 12px 18px;
    background: #111;
    color: white;
    border: none;
    border-radius: 30px;
    z-index: 1000;
}

#admin-btn {
    position: fixed;
    top: 60px;
    right: 15px;
    padding: 10px;
    background: white;
    border-radius: 10px;
    border: none;
    z-index: 1000;
}

/* PRODUCTS */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 18px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
}

.price {
    color: #28a745;
    font-weight: bold;
}

/* ADMIN PANEL */
#admin-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 400px;
    height: 100%;
    background: white;
    z-index: 2000;
    padding: 20px;
    transition: 0.3s;
    overflow-y: auto;
}

#admin-panel.active {
    right: 0;
}

.admin-item {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
}

.add-btn {
    background: #007bff;
    color: white;
    width: 100%;
}

.delete-btn {
    background: red;
    color: white;
    margin-top: 5px;
}

/* CHECKOUT */
#checkout-page {
    display: none;
    padding: 20px;
}

</style>
</head>

<body>

<button id="checkout-btn" onclick="toggleCheckout()">🛒 (<span id="cart-count">0</span>)</button>
<button id="admin-btn" onclick="toggleAdmin()">⚙️</button>

<div id="store-page">
    <div class="header-container">
        <h2>DTSLO</h2>
        <p>Items updated regularly</p>
    </div>
    <div id="product-grid" class="product-grid"></div>
</div>

<div id="checkout-page">
    <h2>Checkout</h2>
    <input id="fname" placeholder="First Name">
    <input id="phone" placeholder="Phone">
    <button onclick="submitOrder()">Place Order</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
    <h2>Admin Panel</h2>

    <h3>Add Product</h3>
    <input id="new-name" placeholder="Name">
    <input id="new-size" placeholder="Size">
    <input id="new-price" placeholder="Price">
    <button class="add-btn" onclick="addProduct()">Add Product</button>

    <h3>Products</h3>
    <div id="admin-list"></div>

    <button onclick="toggleAdmin()">Close</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
    { name: "Redbull", size: "12oz", price: 3.99, available: true }
];

let cart = {};

/* SAVE */
function saveProducts() {
    localStorage.setItem("products", JSON.stringify(products));
}

/* RENDER STORE */
function renderProducts() {
    let grid = document.getElementById("product-grid");
    grid.innerHTML = "";

    products.forEach(p => {
        if (!p.available) return;

        grid.innerHTML += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>${p.size}</p>
            <p class="price">$${p.price}</p>
            <button onclick="addToCart('${p.name}')">Add</button>
        </div>`;
    });
}

/* ADMIN LIST */
function renderAdmin() {
    let list = document.getElementById("admin-list");
    list.innerHTML = "";

    products.forEach((p, i) => {
        list.innerHTML += `
        <div class="admin-item">
            <b>${p.name}</b> ($${p.price})
            <br>
            <label>
                Available 
                <input type="checkbox" ${p.available ? "checked" : ""} 
                onchange="toggleAvailable(${i})">
            </label>
            <button class="delete-btn" onclick="deleteProduct(${i})">Delete</button>
        </div>`;
    });
}

/* ADD PRODUCT */
function addProduct() {
    let name = document.getElementById("new-name").value;
    let size = document.getElementById("new-size").value;
    let price = parseFloat(document.getElementById("new-price").value);

    if (!name || !price) return alert("Fill fields");

    products.push({ name, size, price, available: true });
    saveProducts();
    renderProducts();
    renderAdmin();

    document.getElementById("new-name").value = "";
    document.getElementById("new-size").value = "";
    document.getElementById("new-price").value = "";
}

/* DELETE */
function deleteProduct(i) {
    products.splice(i, 1);
    saveProducts();
    renderProducts();
    renderAdmin();
}

/* TOGGLE AVAILABLE */
function toggleAvailable(i) {
    products[i].available = !products[i].available;
    saveProducts();
    renderProducts();
    renderAdmin();
}

/* CART */
function addToCart(name) {
    cart[name] = (cart[name] || 0) + 1;
    document.getElementById("cart-count").innerText =
        Object.values(cart).reduce((a,b)=>a+b,0);
}

/* NAV */
function toggleCheckout() {
    document.getElementById("store-page").style.display = "none";
    document.getElementById("checkout-page").style.display = "block";
}

/* ADMIN TOGGLE */
function toggleAdmin() {
    document.getElementById("admin-panel").classList.toggle("active");
    renderAdmin();
}

/* ORDER */
function submitOrder() {
    let fn = document.getElementById("fname").value;
    let ph = document.getElementById("phone").value;

    let items = "";
    for (let k in cart) items += k + "(" + cart[k] + ") ";

    let body = "Order: " + fn + " | " + ph + " | " + items;
    window.location.href = "sms:+18052506655?body=" + encodeURIComponent(body);
}

/* INIT */
renderProducts();
</script>

</body>
</html>
