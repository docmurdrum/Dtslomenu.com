<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --text: #f0f0f0;
  --muted: #666;
  --dead: #4ade80;
  --busy: #facc15;
  --packed: #f87171;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ─── NAV ─── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 58px;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px;
  z-index: 2000;
  gap: 6px;
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-right: auto;
}

.nav-btn {
  background: transparent;
  color: var(--muted);
  border: none;
  padding: 7px 13px;
  border-radius: 30px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.nav-btn:hover { color: var(--text); background: var(--surface); }
.nav-btn.active { color: var(--bg); background: var(--accent); font-weight: 600; }

.nav-xp {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  transition: all .2s;
}
.nav-xp:hover { background: var(--surface2); }

/* ─── PAGES ─── */
.page { display: none; padding: 74px 14px 100px; min-height: 100vh; }
.page.active { display: block; }

/* ─── SECTION TITLE ─── */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 14px;
}

/* ─── CARDS / BARS ─── */
.bar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  transition: border-color .2s;
}
.bar-card:hover { border-color: rgba(255,255,255,0.14); }

.bar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.bar-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1px;
}
.bar-time { font-size: 12px; color: var(--muted); }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.status-Dead   { background: rgba(74,222,128,.15); color: var(--dead); }
.status-Busy   { background: rgba(250,204,21,.15);  color: var(--busy); }
.status-Packed { background: rgba(248,113,113,.15); color: var(--packed); }
.status-No-Data { background: var(--surface2); color: var(--muted); }

.report-btns { display: flex; gap: 8px; margin-top: 12px; }
.report-btn {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 4px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.report-btn:hover { background: rgba(255,255,255,0.08); }
.btn-dead:hover   { border-color: var(--dead);   color: var(--dead); }
.btn-busy:hover   { border-color: var(--busy);   color: var(--busy); }
.btn-packed:hover { border-color: var(--packed); color: var(--packed); }

/* Rating */
.star-row { display: flex; gap: 4px; margin-top: 10px; }
.star {
  font-size: 20px; cursor: pointer;
  color: var(--muted); transition: color .15s;
}
.star.on { color: var(--accent); }

/* Activity mini-bars */
.activity-row {
  display: flex; gap: 3px; margin-top: 12px; align-items: flex-end; height: 30px;
}
.activity-bar {
  flex: 1; border-radius: 3px; min-height: 4px;
  background: var(--surface2);
  transition: all .3s;
}

/* ─── DELIVERY ─── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  transition: all .2s;
}
.product-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-2px); }
.product-emoji { font-size: 32px; margin-bottom: 6px; }
.product-name  { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.product-price { color: var(--accent); font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.add-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.add-btn:hover { transform: scale(1.05); }

.cart-fab {
  position: fixed;
  bottom: 80px; right: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 14px 22px;
  border-radius: 30px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 15px;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(232,255,71,0.3);
  transition: all .2s;
  z-index: 1500;
}
.cart-fab:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(232,255,71,0.4); }

/* ─── LOST ─── */
.lost-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  transition: border-color .2s;
}
.lost-card.resolved { opacity: .5; border-style: dashed; }
.lost-tag {
  display: inline-block;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 8px;
}
.tag-lost     { background: rgba(248,113,113,.15); color: var(--packed); }
.tag-found    { background: rgba(74,222,128,.15);  color: var(--dead); }
.tag-resolved { background: var(--surface2); color: var(--muted); }
.lost-photo { width:100%; max-height:200px; object-fit:cover; border-radius:10px; margin:10px 0; }
.lost-actions { display:flex; gap:8px; margin-top:12px; }
.lost-action-btn {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:8px 6px; border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all .2s; text-align:center;
}
.lost-action-btn:hover { background:rgba(255,255,255,0.08); }
.lost-action-btn.contact { border-color:var(--accent); color:var(--accent); }
.lost-action-btn.resolve { border-color:var(--dead); color:var(--dead); }
.search-bar { display:flex; gap:8px; margin-bottom:12px; }
.search-input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  color:var(--text); padding:10px 14px; border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s;
}
.search-input:focus { border-color:rgba(255,255,255,0.2); }
.search-input::placeholder { color:var(--muted); }
.expiry-bar { height:3px; border-radius:2px; background:var(--surface2); margin-top:10px; overflow:hidden; }
.expiry-fill { height:100%; border-radius:2px; }
.photo-preview { width:100%; max-height:160px; object-fit:cover; border-radius:10px; margin-top:8px; display:none; }

/* ─── LEADERBOARD ─── */
.lb-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 8px;
}
.lb-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; width: 32px; text-align: center;
  color: var(--muted);
}
.lb-rank.gold   { color: #f59e0b; }
.lb-rank.silver { color: #94a3b8; }
.lb-rank.bronze { color: #a16207; }
.lb-name { flex: 1; font-weight: 600; }
.lb-xp {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; color: var(--accent);
}

/* ─── PROFILE ─── */
.profile-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin-bottom: 14px;
}
.avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; color: var(--bg);
  margin: 0 auto 12px;
}
.xp-bar-bg {
  background: var(--surface2);
  border-radius: 10px; height: 8px;
  margin: 10px 0;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 10px;
  transition: width .5s ease;
}
.badges-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
.badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px; font-weight: 600;
}
.badge.earned { border-color: var(--accent); color: var(--accent); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 2000;
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 500;
  padding: 6px 16px;
  border-radius: 12px;
  transition: all .2s;
}
.bnav-btn .icon { font-size: 20px; }
.bnav-btn:hover { color: var(--text); }
.bnav-btn.active { color: var(--accent); }

/* ─── MODALS ─── */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 4000;
  pointer-events: none;
}
.modal.open { display: flex; pointer-events: all; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px;
  padding: 24px;
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 0 auto 18px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 1px;
  margin-bottom: 16px;
}

/* ─── FORM INPUTS ─── */
.input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  margin-bottom: 10px;
  transition: border-color .2s;
  outline: none;
}
.input:focus { border-color: rgba(255,255,255,0.2); }
.input::placeholder { color: var(--muted); }

select.input { cursor: pointer; }
textarea.input { resize: vertical; min-height: 80px; }

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 15px;
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.btn-primary:hover { transform: scale(1.02); }

.btn-ghost {
  width: 100%;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  margin-top: 6px;
  transition: all .2s;
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

/* Cart item row */
.cart-item-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.cart-item-controls { display: flex; align-items: center; gap: 10px; }
.qty-btn {
  width: 28px; height: 28px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 50%;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Admin table */
.admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.admin-table th {
  text-align: left; padding: 10px;
  border-bottom: 1px solid var(--border);
  color: var(--muted); font-weight: 500;
}
.admin-table td { padding: 10px; border-bottom: 1px solid var(--border); }
.order-status {
  display: inline-block;
  padding: 3px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 700;
}
.order-pending  { background: rgba(250,204,21,.15); color: var(--busy); }
.order-complete { background: rgba(74,222,128,.15);  color: var(--dead); }

/* Debug */
#debug-box {
  position: fixed; bottom: 70px; left: 10px; right: 10px;
  background: #2a0000; border: 1px solid #f87171;
  color: #f87171; font-size: 12px; font-family: monospace;
  padding: 10px; border-radius: 10px; z-index: 9999;
  display: none; max-height: 160px; overflow-y: auto;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 22px; border-radius: 30px;
  font-size: 14px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: all .3s; z-index: 5000;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Pulse dot */
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dead);
  display: inline-block; margin-right: 5px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .5; transform: scale(1.4); }
}

/* Filter chips */
.filter-chips { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* Auth tabs */
.auth-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
.auth-tab {
  flex: 1; padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.auth-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }

/* Shimmer skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px; height: 80px;
  margin-bottom: 10px;
}
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- TOP NAV (desktop style) -->
<div class="navbar" id="topnav" style="display:none">
  <span class="nav-logo">DTSLO</span>
  <button class="nav-btn" onclick="showPage('line')">Lines</button>
  <button class="nav-btn" onclick="showPage('delivery')">Delivery</button>
  <button class="nav-btn" onclick="showPage('lost')">Lost &amp; Found</button>
  <button class="nav-btn" onclick="showPage('leaderboard')">Leaderboard</button>
  <button class="nav-btn" onclick="showPage('admin')">Admin</button>
  <div class="nav-xp" onclick="showPage('profile')">⚡ <span id="xp-top">0</span> XP</div>
</div>

<!-- PAGES -->
<div id="line"        class="page active"></div>
<div id="delivery"    class="page"></div>
<div id="lost"        class="page"></div>
<div id="leaderboard" class="page"></div>
<div id="profile"     class="page"></div>
<div id="admin"       class="page"></div>

<!-- CART FAB -->
<button class="cart-fab" id="cart-fab" onclick="openCheckout()" style="display:none">
  🛒 Cart · <span id="cart-count">0</span>
</button>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav-btn active" onclick="showPage('line')"        id="bnav-line">        <span class="icon">📍</span>Lines</button>
  <button class="bnav-btn"        onclick="showPage('delivery')"    id="bnav-delivery">    <span class="icon">🛍</span>Delivery</button>
  <button class="bnav-btn"        onclick="showPage('lost')"        id="bnav-lost">        <span class="icon">🔎</span>L&amp;F</button>
  <button class="bnav-btn"        onclick="showPage('leaderboard')" id="bnav-leaderboard"> <span class="icon">🏆</span>Ranks</button>
  <button class="bnav-btn"        onclick="showPage('profile')"     id="bnav-profile">     <span class="icon">👤</span>You</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- DEBUG BOX -->
<div id="debug-box"></div>

<!-- ═══════ MODALS ═══════ -->

<!-- AUTH MODAL -->
<div class="modal open" id="auth-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Welcome to DTSLO</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')"    id="tab-login">Login</button>
      <button class="auth-tab"        onclick="switchAuth('register')" id="tab-register">Sign Up</button>
    </div>
    <div id="auth-login-form">
      <input class="input" id="auth-email"    placeholder="Email" type="email">
      <input class="input" id="auth-password" placeholder="Password" type="password">
      <button class="btn-primary" onclick="login()">Login</button>
    </div>
    <div id="auth-register-form" style="display:none">
      <input class="input" id="reg-name"     placeholder="Display Name">
      <input class="input" id="reg-email"    placeholder="Email" type="email">
      <input class="input" id="reg-password" placeholder="Password (6+ chars)" type="password">
      <button class="btn-primary" onclick="register()">Create Account</button>
    </div>
    <button class="btn-ghost" onclick="var m=document.getElementById('auth-modal');m.classList.remove('open');m.style.display='none';">Continue as Guest</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal" id="checkout-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Your Order</div>
    <div id="order-summary"></div>
    <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:16px;">
      <span>Total</span>
      <span id="order-total" style="color:var(--accent)"></span>
    </div>
    <input class="input" id="order-name"  placeholder="Name">
    <input class="input" id="order-phone" placeholder="Phone / Pickup info">
    <button class="btn-primary" onclick="placeOrder()">Place Order 🎉</button>
    <button class="btn-ghost"   onclick="closeModal('checkout-modal')">Cancel</button>
  </div>
</div>

<!-- LOST MODAL -->
<div class="modal" id="lost-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Post an Item</div>
    <select class="input" id="lf-type">
      <option value="lost">🔴 Lost</option>
      <option value="found">🟢 Found</option>
    </select>
    <input    class="input" id="lf-title"       placeholder="Item (e.g. Black iPhone 14)">

function timeAgo(t) {
  let s = Math.floor((Date.now()-t)/1000);
  if (s<60)  return s+"s ago";
  let m = Math.floor(s/60);
  if (m<60)  return m+"m ago";
  return Math.floor(m/60)+"h ago";
}

function toast(msg, dur=2400) {
  let el = document.getElementById("toast");
  el.textContent = msg;

function getStatus(bar) {
  if (!bar.reports.length) return "No Data";
  let counts = {};
  bar.reports.slice(0,5).forEach(r => counts[r.status]=(counts[r.status]||0)+1);
  return Object.keys(counts).reduce((a,b) => counts[a]>counts[b]?a:b);
}

async function loadReports() {
  try {
    const { data, error } = await sb.from("reports").select("*").order("created_at",{ascending:false});

    barsData.forEach(b => { b.reports=[]; b.ratings=[]; });

    data.forEach(r => {
      let bar = barsData.find(b => b.name===r.bar);
      if (bar) {
        bar.reports.push({ status:r.status, time:new Date(r.created_at).getTime() });
        if (r.rating) bar.ratings.push(r.rating);
      }
    });

    barsData.forEach(b => {
      b.avgRating = b.ratings.length
        ? b.ratings.reduce((a,c)=>a+c,0)/b.ratings.length
        : 0;
    });

  } catch(e) { console.log(e); }
  renderBars();
}

function openCheckout() {

    let item = cart[name];

          <button class="qty-btn" onclick="changeQty('${name}',-1)">−</button>

  }

    s.innerHTML = `<p style="color:var(--muted);text-align:center;padding:20px">Cart is empty</p>`;

  cart[name].qty += delta;

  document.getElementById("cart-count").textContent = total;

const LF_EXPIRY_DAYS = 7; // posts auto-expire after 7 days
let lostSearch = "";

  lostFilter = "all";

  page.innerHTML = `

      <div class="chip"        onclick="setLostFilter('lost',this)">🔴 Lost</div>
      <div class="chip"        onclick="setLostFilter('found',this)">🟢 Found</div>
      <div class="chip"        onclick="setLostFilter('resolved',this)">✅ Resolved</div>
    </div>
    <button onclick="openModal('lost-modal')" style="
      background:var(--accent);color:var(--bg);border:none;
      padding:11px 20px;border-radius:12px;font-family:'DM Sans',sans-serif;
      font-weight:700;font-size:14px;cursor:pointer;margin-bottom:14px;display:block;width:100%">
      + Post Item
    </button>
    <div id="lost-feed"></div>`;
  loadLostItems();

function setLostFilter(val, el) {
  lostFilter = val;
  document.querySelectorAll("#lost .chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  loadLostItems();
}

function getExpiryInfo(createdAt) {
  let age   = Date.now() - new Date(createdAt).getTime();
  let total = LF_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
  let pct   = Math.max(0, Math.min(100, 100 - (age / total * 100)));
  let daysLeft = Math.ceil((total - age) / (24*60*60*1000));
  let color = pct > 50 ? "var(--dead)" : pct > 20 ? "var(--busy)" : "var(--packed)";
  return { pct, daysLeft, color, expired: age > total };
}

async function loadLostItems() {
  let c = document.getElementById("lost-feed");
  if (!c) return;
  c.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;

  try {
    let q = sb.from("lost_found").select("*").order("created_at",{ascending:false});

    // Filter by status
    if (lostFilter === "resolved") {
      q = q.eq("resolved", true);
    } else if (lostFilter !== "all") {
      q = q.eq("type", lostFilter).eq("resolved", false);
    } else {
      q = q.eq("resolved", false);
    }

    // Auto-exclude expired posts (older than 7 days) unless viewing resolved
    if (lostFilter !== "resolved") {
      let cutoff = new Date(Date.now() - LF_EXPIRY_DAYS*24*60*60*1000).toISOString();
      q = q.gte("created_at", cutoff);
    }

    const { data } = await q;
    c.innerHTML = "";
    if (!data || !data.length) {
      c.innerHTML = `<p style="color:var(--muted);text-align:center;padding:30px">Nothing here yet</p>`;
      return;
    }

    // Client-side keyword search
    let items = data;
    if (lostSearch.trim()) {
      let kw = lostSearch.toLowerCase();
      items = data.filter(i =>
        (i.title||"").toLowerCase().includes(kw) ||
        (i.description||"").toLowerCase().includes(kw) ||
        (i.location||"").toLowerCase().includes(kw)
      );
    }

    if (!items.length) {
      c.innerHTML = `<p style="color:var(--muted);text-align:center;padding:30px">No results for "${lostSearch}"</p>`;
      return;
    }

    items.forEach(item => {
      let isResolved = item.resolved;
      let tagClass = isResolved ? "tag-resolved" : item.type==="lost" ? "tag-lost" : "tag-found";
      let tagLabel = isResolved ? "✅ Resolved"  : item.type==="lost" ? "🔴 Lost"   : "🟢 Found";
      let exp = getExpiryInfo(item.created_at);

      // Show contact button if contact info exists
      let contactBtn = item.contact && !isResolved
        ? `<button class="lost-action-btn contact" onclick="contactItem('${item.contact.replace(/'/g,"\\'")}')">📱 Contact</button>`
        : "";

      // Show resolve button only for own posts or any post (adjust logic as needed)
      let resolveBtn = !isResolved
        ? `<button class="lost-action-btn resolve" onclick="resolveItem('${item.id}')">✅ Mark Resolved</button>`
        : "";

      c.innerHTML += `
        <div class="lost-card ${isResolved?"resolved":""}">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <span class="lost-tag ${tagClass}">${tagLabel}</span>
            <span style="font-size:11px;color:var(--muted)">${timeAgo(new Date(item.created_at).getTime())}</span>
          </div>
          <h3 style="font-size:16px;font-weight:700;margin-bottom:4px">${item.title}</h3>
          ${item.location ? `<div style="font-size:13px;color:var(--muted)">📍 ${item.location}</div>` : ""}
          ${item.description ? `<p style="font-size:13px;margin-top:6px;color:#ccc">${item.description}</p>` : ""}
          ${item.photo_url ? `<img class="lost-photo" src="${item.photo_url}" alt="item photo">` : ""}
          ${!isResolved ? `
            <div class="expiry-bar">
              <div class="expiry-fill" style="width:${exp.pct}%;background:${exp.color}"></div>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">Expires in ${exp.daysLeft} day${exp.daysLeft===1?"":"s"}</div>
          ` : ""}
          ${(contactBtn||resolveBtn) ? `<div class="lost-actions">${contactBtn}${resolveBtn}</div>` : ""}
        </div>`;
    });

  } catch(e) { console.log(e); c.innerHTML = `<p style="color:var(--muted);padding:20px">Failed to load</p>`; }
}

function contactItem(contact) {
  // Try to detect phone vs IG handle
  if (/^\d[\d\s\-\(\)]{6,}/.test(contact)) {
    window.open("sms:" + contact.replace(/\D/g,""));
  } else if (contact.startsWith("@")) {
    window.open("https://instagram.com/" + contact.slice(1));
  } else {
    toast("📱 Contact: " + contact);
  }
}

async function resolveItem(id) {
  try {
    await sb.from("lost_found").update({ resolved: true }).eq("id", id);
    await addXP(10, "Item resolved");
    toast("✅ Marked as resolved!");
    loadLostItems();
  } catch(e) { console.log(e); toast("❌ Error"); }
}

function previewPhoto(input) {
  let preview = document.getElementById("lf-photo-preview");
  if (input.files && input.files[0]) {
    let reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function uploadPhoto(file) {
  if (!file) return null;
  try {
    let ext  = file.name.split(".").pop();
    let path = `lost/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from("lost-photos").upload(path, file);
    if (error) { console.log(error); return null; }
    const { data } = sb.storage.from("lost-photos").getPublicUrl(path);
    return data.publicUrl;
  } catch(e) { console.log(e); return null; }
}

async function submitLostItem() {
  let type        = document.getElementById("lf-type").value;
  let title       = document.getElementById("lf-title").value.trim();
  let location    = document.getElementById("lf-location").value.trim();
  let contact     = document.getElementById("lf-contact").value.trim();
  let description = document.getElementById("lf-description").value.trim();
  let photoFile   = document.getElementById("lf-photo").files[0];

  if (!title) { toast("⚠️ Enter item name"); return; }

  toast("Posting...");

  try {
    let photo_url = await uploadPhoto(photoFile);
    await sb.from("lost_found").insert([{ type, title, location, contact, description, photo_url, resolved: false }]);
    await addXP(15, "Lost & Found post");

    // Reset form
    ["lf-title","lf-location","lf-contact","lf-description"].forEach(id => document.getElementById(id).value="");
    document.getElementById("lf-photo").value = "";
    document.getElementById("lf-photo-preview").style.display = "none";

    closeModal("lost-modal");
    loadLostItems();
    toast("📣 Item posted!");
  } catch(e) { console.log(e); toast("❌ Error posting item"); }
}

/* ─── LEADERBOARD ─── */
async function loadLeaderboard() {
  let page = document.getElementById("leaderboard");
  page.innerHTML = `<div class="section-title">🏆 Leaderboard</div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>`;

  try {
    const { data } = await sb.from("profiles").select("*").order("xp",{ascending:false}).limit(20);
    page.innerHTML = `<div class="section-title">🏆 Leaderboard</div>`;
    if (!data || !data.length) {
      page.innerHTML += `<p style="color:var(--muted);padding:20px">No players yet</p>`;
      return;
    }
    data.forEach((p, i) => {
      let rankClass = i===0?"gold":i===1?"silver":i===2?"bronze":"";
      let medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
      let isMe = currentUser && p.id===currentUser.id;
      page.innerHTML += `
        <div class="lb-row" style="${isMe?"border-color:var(--accent)":""}">
          <div class="lb-rank ${rankClass}">${medal||("#"+(i+1))}</div>
          <div class="lb-name">${p.display_name||"Anonymous"}${isMe?" 👈":""}</div>
          <div class="lb-xp">${p.xp} XP</div>
        </div>`;
    });
  } catch(e) { console.log(e); }
}

/* ─── CHARACTER SYSTEM ─── */

  { level:2,  xp:100,  name:"The Tourist",    title:"Just Visiting",              color:"#94a3b8", glow:false,  animated:false },
  { level:3,  xp:200,  name:"The Curious",    title:"Getting Warmed Up",          color:"#7dd3fc", glow:false,  animated:false },
  { level:4,  xp:300,  name:"The Regular",    title:"Knows the Spots",            color:"#7dd3fc", glow:false,  animated:false },
  { level:5,  xp:400,  name:"The Socialite",  title:"Life of the Party",          color:"#86efac", glow:false,  animated:false },
  { level:6,  xp:500,  name:"The Barfly",     title:"Always Around",              color:"#86efac", glow:false,  animated:false },
  { level:7,  xp:600,  name:"The Connector",  title:"Knows Everyone",             color:"#fcd34d", glow:false,  animated:false },
  { level:8,  xp:700,  name:"The Veteran",    title:"Been Around",                color:"#fcd34d", glow:false,  animated:false },
  { level:9,  xp:800,  name:"The Nighthawk",  title:"Owns the Night",             color:"#f97316", glow:false,  animated:false },
  { level:10, xp:900,  name:"The Insider",    title:"Has the Intel",              color:"#f97316", glow:false,  animated:false },
  { level:11, xp:1000, name:"The VIP",        title:"Skip the Line",              color:"#e8ff47", glow:true,   animated:false },
  { level:12, xp:1100, name:"The Cult Figure",title:"People Know Your Name",      color:"#e8ff47", glow:true,   animated:false },

  { level:14, xp:1300, name:"The Myth",       title:"Is This Real?",              color:"#fb923c", glow:true,   animated:false },
  { level:15, xp:1400, name:"The Ghost",      title:"Seen Everywhere, Known by None", color:"#c084fc", glow:true, animated:true },
  { level:16, xp:1500, name:"The Oracle",     title:"Knows Before It Happens",    color:"#c084fc", glow:true,   animated:true },
  { level:17, xp:1600, name:"The Phantom",    title:"The Night Itself",           color:"#818cf8", glow:true,   animated:true },

  { level:20, xp:1900, name:"The Legend",     title:"DTSLO Is You",               color:"#e8ff47", glow:true,   animated:true },
];

function getLevelData(xp) {
  let lvl = LEVELS[0];
  for (let l of LEVELS) { if (xp >= l.xp) lvl = l; }
  return lvl;
}

function getNextLevel(xp) {
  return LEVELS.find(l => l.xp > xp) || null;
}

function drawCharacter(lvl, size=120) {
  try {
    let c = lvl.color;
    let l = lvl.level;
    let glow = lvl.glow ? `filter:drop-shadow(0 0 10px ${c})` : "";
    let anim = lvl.animated ? `style="animation:charFloat 2.5s ease-in-out infinite"` : "";

    let hat = "";
    if      (l >= 20) hat = `<ellipse cx="60" cy="20" rx="20" ry="6" fill="${c}"/><rect x="48" y="10" width="24" height="12" rx="4" fill="${c}"/>`;
    else if (l >= 15) hat = `<polygon points="60,8 73,24 47,24" fill="${c}"/>`;
    else if (l >= 11) hat = `<rect x="45" y="15" width="30" height="8" rx="4" fill="${c}"/>`;
    else if (l >= 7)  hat = `<path d="M47 22 Q60 10 73 22" stroke="${c}" stroke-width="3" fill="none"/>`;
    else if (l >= 4)  hat = `<rect x="50" y="17" width="20" height="6" rx="3" fill="${c}" opacity="0.7"/>`;

    let aura = "";
    if      (l >= 15) aura = `<circle cx="60" cy="70" r="54" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.25"/>`;
    else if (l >= 11) aura = `<circle cx="60" cy="70" r="50" fill="none" stroke="${c}" stroke-width="1" opacity="0.15"/>`;

    let stars = l >= 20 ? `<text x="18" y="32" font-size="10" fill="${c}">★</text><text x="90" y="30" font-size="8" fill="${c}">★</text>` : "";

    let smile = l >= 8
      ? `<path d="M53 53 Q60 59 67 53" stroke="#8b5e3c" stroke-width="1.5" fill="none" stroke-linecap="round"/>`
      : `<path d="M54 53 Q60 56 66 53" stroke="#8b5e3c" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;

    return `<svg width="${size}" height="${size}" viewBox="0 0 120 130" ${anim} style="${glow}">
      ${aura}${stars}
      <ellipse cx="60" cy="95" rx="26" ry="28" fill="#1c1c26" stroke="${l>=8?c:'#444'}" stroke-width="1.5"/>
      <rect x="54" y="58" width="12" height="10" rx="2" fill="#c8a882"/>
      <circle cx="60" cy="46" r="22" fill="#c8a882" stroke="${l>=8?c:'#555'}" stroke-width="1.5"/>
      <circle cx="53" cy="44" r="3.5" fill="white"/><circle cx="67" cy="44" r="3.5" fill="white"/>
      <circle cx="53.5" cy="44" r="2" fill="#1a1a2e"/><circle cx="67.5" cy="44" r="2" fill="#1a1a2e"/>
      ${l>=5?`<circle cx="54" cy="43" r="0.8" fill="white"/><circle cx="68" cy="43" r="0.8" fill="white"/>`:""}
      ${smile}
      <path d="M38 40 Q42 24 60 22 Q78 24 82 40 Q78 30 60 28 Q42 30 38 40Z" fill="#3d2b1f"/>
      ${hat}
      <rect x="50" y="118" width="9" height="12" rx="4" fill="#333"/>
      <rect x="61" y="118" width="9" height="12" rx="4" fill="#333"/>
    </svg>`;
  } catch(e) {
    return `<div style="width:${size}px;height:${size}px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px">👤</div>`;
  }
}

/* ─── PROFILE ─── */
function renderProfile() {
  let page = document.getElementById("profile");
  if (!userProfile) { page.innerHTML = `<p style="color:var(--muted);padding:20px">Not logged in</p>`; return; }

  let lvl      = getLevelData(xp);
  let nextLvl  = getNextLevel(xp);
  let pct      = nextLvl ? Math.round(((xp - lvl.xp) / (nextLvl.xp - lvl.xp)) * 100) : 100;
  let xpToNext = nextLvl ? (nextLvl.xp - xp) : 0;

  let earned = BADGES.filter(b => b.req(userProfile||{xp,reports:0}));
  let badgeHTML = BADGES.map(b => {
    let has = earned.find(e=>e.id===b.id);
    return `<div class="badge ${has?"earned":""}">${b.emoji} ${b.label}</div>`;
  }).join("");

  // Next 3 upcoming characters
  let upcomingHTML = LEVELS.filter(l => l.xp > xp).slice(0,3).map(l => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid ${l.color}33">
        <svg width="30" height="30" viewBox="0 0 120 130" style="opacity:0.4">
          <circle cx="60" cy="44" r="22" fill="#666"/>
          <ellipse cx="60" cy="90" rx="26" ry="32" fill="#444"/>
        </svg>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--muted)">${l.name}</div>
        <div style="font-size:11px;color:var(--muted)">${l.title}</div>
      </div>
      <div style="font-size:12px;color:${l.color};font-weight:700">${l.xp} XP</div>
    </div>`).join("");

  page.innerHTML = `
    <div class="section-title">👤 Profile</div>

    <!-- Character card -->
    <div class="profile-hero" style="border-color:${lvl.color}44">
      <div style="margin:0 auto 8px;width:120px;height:120px;display:flex;align-items:center;justify-content:center">
        ${drawCharacter(lvl, 120)}
      </div>
      <div style="font-size:20px;font-weight:700;margin-bottom:2px">${userProfile.display_name||"Guest"}</div>
      <div style="color:${lvl.color};font-size:13px;font-weight:700;margin-bottom:2px">${lvl.name}</div>
      <div style="color:var(--muted);font-size:12px;font-style:italic;margin-bottom:10px">"${lvl.title}"</div>

      <!-- XP bar -->
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
        <span>Level ${lvl.level}</span>
        <span>${nextLvl ? `${xpToNext} XP to Level ${nextLvl.level}` : "MAX LEVEL"}</span>
      </div>
      <div class="xp-bar-bg">
        <div class="xp-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${lvl.color},${lvl.color}aa)"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">${xp} total XP</div>
      <div class="badges-row">${badgeHTML}</div>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total XP</div>
        <div class="stat-value" style="color:${lvl.color}">${xp}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reports</div>
        <div class="stat-value">${userProfile.reports||0}</div>
      </div>
    </div>

    <!-- Upcoming characters -->
    ${nextLvl ? `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Unlocking Next</div>
      ${upcomingHTML}
    </div>` : `<div style="text-align:center;padding:20px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px">👑 MAX LEVEL REACHED</div>`}

    ${currentUser
      ? `<button class="btn-ghost" onclick="logout()">Log Out</button>`
      : `<button class="btn-primary" onclick="openModal('auth-modal')">Sign In to Save Progress</button>`}

    <style>
      @keyframes charFloat {
        0%,100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
      }
      @keyframes auraPulse {
        0%,100% { opacity: 0.3; r: 52; }
        50%      { opacity: 0.6; r: 56; }
      }
    </style>`;
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  userProfile = { display_name:"Guest", xp:0, reports:0 };
  xp = 0;
  updateXPDisplay();
  renderProfile();
  toast("👋 Logged out");
}

/* ─── ADMIN ─── */
async function loadAdminOrders() {
  let page = document.getElementById("admin");
  page.innerHTML = `<div class="section-title">⚙️ Admin — Orders</div><div class="skeleton"></div>`;

  try {
    const { data } = await sb.from("orders").select("*").order("created_at",{ascending:false}).limit(30);
    page.innerHTML = `<div class="section-title">⚙️ Admin — Orders</div>`;

    if (!data || !data.length) {
      page.innerHTML += `<p style="color:var(--muted);padding:20px">No orders yet</p>`;
      return;
    }

    let tableHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <table class="admin-table">
        <thead><tr>
          <th>Name</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th>
        </tr></thead><tbody>`;

    data.forEach(o => {
      let sc = o.status==="complete" ? "order-complete" : "order-pending";
      tableHTML += `<tr>
        <td><strong>${o.name}</strong><br><span style="color:var(--muted);font-size:12px">${o.phone}</span></td>
        <td style="font-size:12px;color:var(--muted)">${o.items}</td>
        <td style="color:var(--accent);font-weight:700">$${o.total||"?"}</td>
        <td><span class="order-status ${sc}">${o.status||"pending"}</span></td>
        <td>
          ${o.status!=="complete"
            ? `<button onclick="markOrderComplete('${o.id}')" style="background:var(--dead);color:var(--bg);border:none;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700">✓ Done</button>`
            : "—"}
        </td>
      </tr>`;
    });

    tableHTML += `</tbody></table></div>`;
    page.innerHTML += tableHTML;

  } catch(e) { console.log(e); }
}

async function markOrderComplete(id) {
  await sb.from("orders").update({ status:"complete" }).eq("id", id);
  toast("✅ Order marked complete");
  loadAdminOrders();
}

/* ─── REAL-TIME ─── */
function setupRealtime() {
  sb.channel("reports-rt")
    .on("postgres_changes", { event:"INSERT", schema:"public", table:"reports" }, () => {
      loadReports();
    })
    .subscribe();

  sb.channel("orders-rt")
    .on("postgres_changes", { event:"INSERT", schema:"public", table:"orders" }, () => {
      if (currentPage === "admin") loadAdminOrders();
    })
    .subscribe();
}

/* ─── PUSH NOTIFICATIONS (browser) ─── */
async function requestNotifications() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    let perm = await Notification.requestPermission();
    if (perm === "granted") toast("🔔 Notifications enabled!");
  }
}

function sendNotif(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { body, icon:"https://fav.farm/🍺" });
  }
}

/* ─── INIT ─── */
window.onload = async function() {
  // Always set safe defaults first
  currentUser = null;
  userProfile = { display_name: "Guest", xp: 0, reports: 0 };
  xp = 0;

  // Always render pages immediately — no waiting on Supabase
  try { renderBarsPage(); }     catch(e) { console.log("renderBarsPage:", e); document.getElementById('line').innerHTML = '<p style="color:red;padding:20px">Error: '+e.message+'</p>'; }
  try { renderDeliveryPage(); } catch(e) { console.log("renderDeliveryPage:", e); }
  try { renderLostPage(); }     catch(e) { console.log("renderLostPage:", e); }
  try { renderProfile(); }      catch(e) { console.log("renderProfile:", e); }

  // Then try Supabase stuff in background
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) await onLogin(session.user);
  } catch(e) { console.log("Session check failed:", e); }

  try { loadReports(); }        catch(e) { console.log("loadReports:", e); }
  try { setupRealtime(); }      catch(e) { console.log("setupRealtime:", e); }
  try { requestNotifications(); } catch(e) {}

  setInterval(() => { try { loadReports(); } catch(e){} }, 60000);
};
</script>
