<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin:0;
    background:#f5f7fa;
}

/* NAV */
.navbar {
    position: fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    padding:0 15px;
    z-index:2000;
}

.menu-btn {
    font-size:22px;
    cursor:pointer;
}

.dropdown {
    position:absolute;
    top:60px;
    left:0;
    background:white;
    width:220px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    display:none;
}

.dropdown div {
    padding:15px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

/* PAGES */
.page {
    display:none;
    padding-top:70px;
}
.active {
    display:block;
}

/* BARS */
.bar {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.status {
    font-weight:bold;
    margin:10px 0;
}

.buttons button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* XP */
#xp-bar {
    position:fixed;
    bottom:0;
    left:0;
    height:6px;
    background:#28a745;
    width:0%;
}

/* CART */
#checkout-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    background:#111;
    color:white;
    padding:10px 15px;
    border-radius:20px;
}

/* PRODUCT GRID */
.product-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
    padding:10px;
}

.card {
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="dropdown">
    <div onclick="showPage('line')">Line Check</div>
    <div onclick="showPage('delivery')">Line & Entry Delivery</div>
    <div onclick="showPage('food')">Food Recommendations</div>
    <div onclick="showPage('events')">Concerts & Events</div>
</div>

<!-- LINE CHECK -->
<div id="line" class="page active"></div>

<!-- DELIVERY -->
<div id="delivery" class="page">
    <button id="checkout-btn">Cart (<span id="cart-count">0</span>)</button>
    <div id="product-grid" class="product-grid"></div>
</div>

<!-- OTHER -->
<div id="food" class="page"><h2 style="padding:20px;">Food Coming Soon</h2></div>
<div id="events" class="page"><h2 style="padding:20px;">Events Coming Soon</h2></div>

<div id="xp-bar"></div>

<script>
/* SUPABASE */
const SUPABASE_URL = "https://jwgwufggptpdmgcmmqes.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Z3d1ZmdncHRwZG1nY21tcWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTExNTAsImV4cCI6MjA4OTYyNzE1MH0.mzbgdrq10Y203l1-oj-m4WjoQs9Z3KgsrFoEU24lV18";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* MENU */
function toggleMenu(){
    let m=document.getElementById("menu");
    m.style.display = m.style.display==="block"?"none":"block";
}

function showPage(p){
    document.querySelectorAll(".page").forEach(pg=>pg.classList.remove("active"));
    document.getElementById(p).classList.add("active");
}

/* BARS */
var bars = [
    {name:"Library", reports:[]},
    {name:"Mothers Tavern", reports:[]},
    {name:"Frog & Peach", reports:[]}
];

var xp = 0;

function getStatus(bar){
    if(bar.reports.length===0) return "No Data";
    let recent = bar.reports.slice(0,5);
    let counts = {};
    recent.forEach(r=>{
        counts[r.status]=(counts[r.status]||0)+1;
    });
    return Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b);
}

function renderBars(){
    let container=document.getElementById("line");
    container.innerHTML="";

    bars.forEach((bar,i)=>{
        container.innerHTML+=`
        <div class="bar">
            <h3>${bar.name}</h3>
            <div class="status">${getStatus(bar)}</div>
            <div class="buttons">
                <button onclick="report(${i},'Dead')">Dead</button>
                <button onclick="report(${i},'Busy')">Busy</button>
                <button onclick="report(${i},'Packed')">Packed</button>
            </div>
        </div>`;
    });
}

/* REPORT TO SUPABASE */
async function report(i,status){
    await supabaseClient.from("reports").insert([
        {bar: bars[i].name, status: status}
    ]);

    xp+=10;
    document.getElementById("xp-bar").style.width=(xp%100)+"%";

    loadReports();
}

/* LOAD REPORTS */
async function loadReports(){
    const {data,error} = await supabaseClient
        .from("reports")
        .select("*")
        .order("created_at",{ascending:false});

    if(error){console.log(error);return;}

    bars.forEach(b=>b.reports=[]);

    data.forEach(r=>{
        let b = bars.find(x=>x.name===r.bar);
        if(b){
            b.reports.push({
                status:r.status,
                time:new Date(r.created_at).getTime()
            });
        }
    });

    renderBars();
}

/* PRODUCTS */
var products=[
    {name:"Redbull",price:3.99},
    {name:"Charger",price:14.99}
];

var cart={};

function renderProducts(){
    let grid=document.getElementById("product-grid");
    products.forEach(p=>{
        grid.innerHTML+=`
        <div class="card">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="addToCart('${p.name}')">Add</button>
        </div>`;
    });
}

function addToCart(name){
    cart[name]=(cart[name]||0)+1;
    let total=0;
    for(let k in cart) total+=cart[k];
    document.getElementById("cart-count").innerText=total;
}

/* INIT */
window.onload=function(){
    renderProducts();
    loadReports();
    setInterval(loadReports,5000);
};
</script>

</body>
</html>
