<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO App</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    background: #f5f7fa;
}

/* MENU */
#menu-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background: #111;
    color: white;
    border: none;
    padding: 12px 15px;
    border-radius: 10px;
    z-index: 2000;
}

#menu-dropdown {
    display: none;
    position: fixed;
    top: 60px;
    left: 15px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    overflow: hidden;
    z-index: 2000;
}

.menu-item {
    padding: 12px 18px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.menu-item:hover {
    background: #f0f0f0;
}

/* CART */
#checkout-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 12px 18px;
    background: #111;
    color: white;
    border-radius: 30px;
    z-index: 1000;
}

/* SECTIONS */
.section { display: none; }
.active { display: block; }

/* HEADER */
.header-container {
    text-align: center;
    padding: 80px 20px 30px;
    background: linear-gradient(135deg, #28a745, #20c997);
    color: white;
    border-bottom-left-radius: 25px;
    border-bottom-right-radius: 25px;
}

/* GRID */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 18px;
    max-width: 900px;
    margin: 30px auto;
    padding: 0 15px;
}

.card {
    background: white;
    padding: 18px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    text-align: center;
}

.price {
    color: #28a745;
    font-weight: bold;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* LINE CHECK CARDS */
.bar-card {
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:12px;
}

/* CHECKOUT */
#checkout-page {
    display: none;
    max-width: 450px;
    margin: 60px auto;
    padding: 20px;
}

/* MODAL */
#thankyou-modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<!-- MENU -->
<button id="menu-btn" onclick="toggleMenu()">☰</button>

<div id="menu-dropdown">
    <div class="menu-item" onclick="showSection('linecheck')">Line Check</div>
    <div class="menu-item" onclick="showSection('delivery')">Line & Entry Delivery</div>
    <div class="menu-item" onclick="showSection('food')">Food Recommendations</div>
    <div class="menu-item" onclick="showSection('events')">Concerts & Events</div>
</div>

<!-- CART -->
<button id="checkout-btn" onclick="toggleCheckout()">🛒 (<span id="cart-count">0</span>)</button>

<!-- LINE CHECK -->
<div id="linecheck" class="section active">
    <div class="header-container">
        <h1>Line Check</h1>
        <p>Live bar activity</p>
    </div>

    <div id="best-bar" style="padding:15px;font-weight:bold;"></div>
    <div id="bars-list" style="padding:15px;"></div>
</div>

<!-- DELIVERY -->
<div id="delivery" class="section">
    <div class="header-container">
        <h1>Line & Entry Delivery</h1>
    </div>
    <div id="product-grid" class="product-grid"></div>
</div>

<!-- FOOD -->
<div id="food" class="section">
    <div class="header-container">
        <h1>Food Recommendations</h1>
    </div>
    <div style="padding:20px;">Coming soon 🍔</div>
</div>

<!-- EVENTS -->
<div id="events" class="section">
    <div class="header-container">
        <h1>Concerts & Events</h1>
    </div>
    <div style="padding:20px;">Coming soon 🎵</div>
</div>

<!-- CHECKOUT -->
<div id="checkout-page">
    <input type="text" id="fname" placeholder="First Name">
    <input type="tel" id="phone" placeholder="Phone Number">
    <button onclick="submitOrder()">Place Order</button>
</div>

<!-- MODAL -->
<div id="thankyou-modal">
    <div class="modal-box">
        <h3>Thank You!</h3>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>

/* MENU */
function toggleMenu() {
    var menu = document.getElementById('menu-dropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function showSection(id) {
    var sections = document.getElementsByClassName('section');
    for (var i = 0; i < sections.length; i++) {
        sections[i].classList.remove('active');
    }
    document.getElementById(id).classList.add('active');
    document.getElementById('menu-dropdown').style.display = "none";
}

/* LINE CHECK SYSTEM */
var bars = [
    { name: "The Library", reports: [] },
    { name: "Frog & Peach", reports: [] },
    { name: "Bull’s Tavern", reports: [] }
];

function reportStatus(i, status) {
    bars[i].reports.push({ status: status, time: Date.now() });
    updateBars();
}

function getStatus(reports) {
    if (reports.length === 0) return "No Data";
    var recent = reports.slice(-10);
    var score = 0;

    recent.forEach(r => {
        if (r.status === "Not Busy") score += 1;
        if (r.status === "Moderate") score += 2;
        if (r.status === "Packed") score += 3;
    });

    var avg = score / recent.length;
    if (avg < 1.7) return "🟢 Not Busy";
    if (avg < 2.4) return "🟡 Moderate";
    return "🔴 Packed";
}

function getTrend(reports) {
    if (reports.length < 6) return "";
    var last = reports.slice(-3);
    var prev = reports.slice(-6, -3);

    function avg(arr) {
        var s = 0;
        arr.forEach(r => {
            if (r.status === "Not Busy") s += 1;
            if (r.status === "Moderate") s += 2;
            if (r.status === "Packed") s += 3;
        });
        return s / arr.length;
    }

    var diff = avg(last) - avg(prev);
    if (diff > 0.3) return "📈 Getting busier";
    if (diff < -0.3) return "📉 Slowing down";
    return "➖ Stable";
}

function updateBars() {
    var container = document.getElementById("bars-list");
    container.innerHTML = "";

    var bestBar = null;
    var bestScore = 999;

    bars.forEach((bar, i) => {
        var status = getStatus(bar.reports);
        var trend = getTrend(bar.reports);

        var score = status.includes("🟢") ? 1 : status.includes("🟡") ? 2 : 3;
        if (score < bestScore) {
            bestScore = score;
            bestBar = bar.name;
        }

        container.innerHTML += `
        <div class="bar-card">
            <strong>${bar.name}</strong><br>
            ${status}<br>
            <small>${trend}</small><br><br>
            <button onclick="reportStatus(${i}, 'Not Busy')">🟢</button>
            <button onclick="reportStatus(${i}, 'Moderate')">🟡</button>
            <button onclick="reportStatus(${i}, 'Packed')">🔴</button>
        </div>`;
    });

    document.getElementById("best-bar").innerHTML =
        bestBar ? "🔥 Best Right Now: " + bestBar : "";
}

/* DELIVERY SYSTEM */
var products = [
    { name: "Redbull", size: "12oz", price: 3.99, available: true },
    { name: "Charger", size: "1 unit", price: 14.99, available: true }
];

var cart = {};

function renderProducts() {
    var grid = document.getElementById('product-grid');
    grid.innerHTML = "";
    products.forEach(p => {
        if (p.available) {
            grid.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <p>${p.size}</p>
                <p class="price">$${p.price}</p>
                <button onclick="addToCart('${p.name}')">Add</button>
            </div>`;
        }
    });
}

function addToCart(name) {
    cart[name] = (cart[name] || 0) + 1;
    var total = 0;
    for (var k in cart) total += cart[k];
    document.getElementById('cart-count').innerText = total;
}

function toggleCheckout() {
    document.getElementById('checkout-page').style.display = "block";
}

function submitOrder() {
    var fn = document.getElementById('fname').value;
    var ph = document.getElementById('phone').value;

    navigator.geolocation.getCurrentPosition(function(pos) {
        var loc = pos.coords.latitude + "," + pos.coords.longitude;
        var items = "";
        for (var k in cart) items += k + "(" + cart[k] + ") ";

        var body = "Order: " + fn + " | " + ph + " | " + items + " | " + loc;

        window.location.href = "sms:+18052506655?&body=" + encodeURIComponent(body);

        document.getElementById('thankyou-modal').style.display = "flex";
        cart = {};
        document.getElementById('cart-count').innerText = "0";
    });
}

function closeModal() {
    document.getElementById('thankyou-modal').style.display = "none";
}

/* INIT */
window.onload = function() {
    renderProducts();
    updateBars();
};

</script>

</body>
</html>
