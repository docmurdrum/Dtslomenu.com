<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; background:#f5f7fa; }

.navbar {
    position:fixed; top:0; left:0; right:0;
    height:60px; background:#111; color:white;
    display:flex; align-items:center;
    padding:0 15px; z-index:2000;
}

.menu-btn { font-size:22px; cursor:pointer; }

#player-info {
    margin-left:10px;
    font-size:14px;
}

.page { display:none; padding-top:80px; }
.active { display:block; }

.bar {
    background:white; margin:15px; padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.status { font-weight:bold; margin:10px 0; }
.dead { color:#28a745; }
.busy { color:#ffc107; }
.packed { color:#dc3545; }

.buttons button {
    margin:5px; padding:10px;
    border:none; border-radius:10px;
}

#xp-bar {
    position:fixed;
    bottom:0; left:0;
    height:6px;
    background:#28a745;
    width:0%;
    transition:width 0.3s;
}

/* floating text */
.xp-float {
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:#28a745;
    font-weight:bold;
    animation:floatUp 1s forwards;
}
@keyframes floatUp {
    0%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-40px);}
}
</style>
</head>

<body>

<div class="navbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="player-info">Lv 1 • Rookie</div>
</div>

<div id="line" class="page active"></div>

<div id="xp-bar"></div>

<script>
/* SUPABASE */
const supabaseClient = window.supabase.createClient(
"https://jwgwufggptpdmgcmmqes.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Z3d1ZmdncHRwZG1nY21tcWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTExNTAsImV4cCI6MjA4OTYyNzE1MH0.mzbgdrq10Y203l1-oj-m4WjoQs9Z3KgsrFoEU24lV18"
);

/* MENU */
function toggleMenu(){}

/* DATA */
var bars = [
    {name:"Library", reports:[]},
    {name:"Mothers Tavern", reports:[]},
    {name:"Frog & Peach", reports:[]}
];

var xp = 0;
var level = 1;
var streak = 0;
var lastReportTime = 0;

/* TITLE */
function getTitle(){
    if(level < 3) return "Rookie";
    if(level < 6) return "Local";
    if(level < 10) return "Regular";
    return "Nightlife Legend";
}

/* UI UPDATE */
function updatePlayerUI(){
    let el = document.getElementById("player-info");
    if(el){
        el.innerText = `Lv ${level} • ${getTitle()}`;
    }
}

/* LEVEL UP */
function checkLevelUp(){
    let required = level * 100;
    if(xp >= required){
        level++;
        xp -= required;
        showLevelUp();
    }
}

/* POPUPS */
function showLevelUp(){
    let el = document.createElement("div");
    el.innerText = "🎉 LEVEL UP!";
    Object.assign(el.style,{
        position:"fixed",top:"40%",left:"50%",
        transform:"translate(-50%,-50%)",
        background:"#111",color:"white",
        padding:"20px",borderRadius:"15px",
        zIndex:"3000"
    });
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1500);
}

function showStreak(){
    let el = document.createElement("div");
    el.className="xp-float";
    el.innerText=`🔥 ${streak} streak`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

/* STREAK */
function updateStreak(){
    let now = Date.now();
    if(now - lastReportTime < 60000){
        streak++;
    } else {
        streak = 1;
    }
    lastReportTime = now;
    if(streak > 1) showStreak();
}

/* STATUS */
function getStatus(bar){
    if(bar.reports.length===0) return "No Data";
    let recent = bar.reports.slice(0,5);
    let counts = {};
    recent.forEach(r=>{
        counts[r.status]=(counts[r.status]||0)+1;
    });
    return Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b);
}

function getStatusClass(status){
    if(status==="Dead") return "dead";
    if(status==="Busy") return "busy";
    if(status==="Packed") return "packed";
    return "";
}

/* RENDER */
function renderBars(){
    let container=document.getElementById("line");
    container.innerHTML="";

    bars.forEach((bar,i)=>{
        let status=getStatus(bar);
        container.innerHTML+=`
        <div class="bar">
            <h3>${bar.name}</h3>
            <div class="status ${getStatusClass(status)}">${status}</div>
            <div class="buttons">
                <button onclick="report(${i},'Dead')">Dead</button>
                <button onclick="report(${i},'Busy')">Busy</button>
                <button onclick="report(${i},'Packed')">Packed</button>
            </div>
        </div>`;
    });
}

/* REPORT */
async function report(i,status){
    try {
        await supabaseClient.from("reports").insert([
            {bar: bars[i].name, status: status}
        ]);
    } catch(e){ console.log(e); }

    xp += 10;

    document.getElementById("xp-bar").style.width = (xp % 100) + "%";

    let el=document.createElement("div");
    el.className="xp-float";
    el.innerText="+10 XP";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);

    updateStreak();
    checkLevelUp();
    updatePlayerUI();

    loadReports();
}

/* LOAD */
async function loadReports(){
    try {
        const {data,error} = await supabaseClient
            .from("reports")
            .select("*")
            .order("created_at",{ascending:false});

        if(error) throw error;

        bars.forEach(b=>b.reports=[]);

        data.forEach(r=>{
            let b = bars.find(x=>x.name===r.bar);
            if(b){
                b.reports.push({
                    status:r.status,
                    time:new Date(r.created_at).getTime()
                });
            }
        });

    } catch(e){
        console.log(e);
    }

    renderBars();
}

/* INIT */
window.onload=function(){
    renderBars();
    loadReports();
    setInterval(loadReports,5000);
};
</script>

</body>
</html>
