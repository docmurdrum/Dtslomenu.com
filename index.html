<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTSLO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto; margin:0; background:#f5f7fa; }

.navbar {
    position:fixed; top:0; left:0; right:0;
    height:60px; background:#111; color:white;
    display:flex; align-items:center;
    padding:0 15px;
}

#player-info { margin-left:10px; font-size:14px; }
#leaderboard { margin-left:auto; font-size:12px; }

.page { padding-top:80px; }

.bar {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.status { font-weight:bold; margin:10px 0; }

.buttons button {
    margin:4px;
    padding:8px;
    border:none;
    border-radius:10px;
}

.confirm-btn { background:#eee; }

#xp-bar {
    position:fixed;
    bottom:0;
    left:0;
    height:6px;
    background:#28a745;
    width:0%;
    transition:width 0.3s;
}

.xp-float {
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:#28a745;
    font-weight:bold;
    animation:floatUp 1s forwards;
}

@keyframes floatUp {
    0%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-40px);}
}

.feed-card {
    background:white;
    padding:10px;
    margin:10px;
    border-radius:10px;
    font-size:13px;
    box-shadow:0 3px 10px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="navbar">
    <div id="player-info">Lv 1 • Rookie</div>
    <div id="leaderboard">🏆 0 reports</div>
</div>

<div class="page">

    <!-- 🔥 LIVE FEED -->
    <div id="activity-feed"></div>

    <!-- BARS -->
    <div id="line"></div>

</div>

<div id="xp-bar"></div>

<script>
/* 🔑 SUPABASE (LINE ~70) */
const supabaseClient = window.supabase.createClient(
"https://jwgwufggptpdmgcmmqes.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Z3d1ZmdncHRwZG1nY21tcWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTExNTAsImV4cCI6MjA4OTYyNzE1MH0.mzbgdrq10Y203l1-oj-m4WjoQs9Z3KgsrFoEU24lV18"
);

/* DATA */
var bars = [
    {name:"Library", reports:[]},
    {name:"Mothers Tavern", reports:[]},
    {name:"Frog & Peach", reports:[]}
];

/* USER DATA */
var xp = 0;
var level = 1;
var totalReports = parseInt(localStorage.getItem("reports")) || 0;
var myBarReports = JSON.parse(localStorage.getItem("myBarReports")) || {};

/* FEED */
var activityFeed = [];

/* CHECK-IN */
var lastCheckInDate = localStorage.getItem("checkinDate") || "";
var today = new Date().toDateString();
var firstCheckInDone = (lastCheckInDate === today);

/* TITLE */
function getTitle(){
    if(level < 3) return "Rookie";
    if(level < 6) return "Local";
    if(level < 10) return "Regular";
    return "Legend";
}

/* UI */
function updatePlayerUI(){
    document.getElementById("player-info").innerText =
        `Lv ${level} • ${getTitle()}`;
}

function updateLeaderboardUI(){
    document.getElementById("leaderboard").innerText =
        `🏆 ${totalReports} reports`;
}

/* XP FLOAT */
function showXP(text){
    let el=document.createElement("div");
    el.className="xp-float";
    el.innerText=text;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

/* LEVEL */
function checkLevelUp(){
    let required = level * 100;
    if(xp >= required){
        level++;
        xp -= required;
        showXP("🎉 LEVEL UP!");
    }
}

/* UPDATE BAR */
function updateBar(){
    document.getElementById("xp-bar").style.width = (xp % 100) + "%";
    checkLevelUp();
    updatePlayerUI();
}

/* TIME AGO */
function timeAgo(timestamp){
    let seconds = Math.floor((Date.now() - timestamp)/1000);
    if(seconds < 10) return "just now";
    if(seconds < 60) return seconds + " sec ago";
    let min = Math.floor(seconds/60);
    if(min < 60) return min + " min ago";
    return Math.floor(min/60) + " hr ago";
}

/* LAST UPDATED */
function getLastUpdated(bar){
    if(bar.reports.length===0) return "No data";
    return timeAgo(bar.reports[0].time);
}

/* STATUS */
function getStatus(bar){
    if(bar.reports.length===0) return "No Data";
    let recent = bar.reports.slice(0,5);
    let counts={};
    recent.forEach(r=>counts[r.status]=(counts[r.status]||0)+1);
    return Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b);
}

/* 👑 OWNERSHIP */
function getOwner(bar){
    let myCount = myBarReports[bar.name] || 0;
    let total = bar.reports.length;

    if(total === 0) return "No owner";

    if(myCount >= Math.ceil(total/2)){
        return `👑 You (${myCount})`;
    }
    return `Top reporter (${total})`;
}

/* BONUS */
function getFirstReportBonus(bar){
    if(bar.reports.length===0){
        return {xp:50,label:"🔥 First Report!"};
    }
    let minutes=(Date.now()-bar.reports[0].time)/60000;
    if(minutes>10){
        return {xp:25,label:"⚡ Revived!"};
    }
    return {xp:0,label:""};
}

/* 🔥 FEED */
function addActivity(text){
    activityFeed.unshift({
        text:text,
        time:Date.now()
    });

    if(activityFeed.length > 20){
        activityFeed.pop();
    }

    renderFeed();
}

function renderFeed(){
    let feed=document.getElementById("activity-feed");
    if(!feed) return;

    feed.innerHTML="";

    activityFeed.forEach(a=>{
        feed.innerHTML+=`
        <div class="feed-card">
            ${a.text}
            <div style="font-size:11px;color:#777;">
                ${timeAgo(a.time)}
            </div>
        </div>`;
    });
}

/* CHECK-IN */
function checkIn(){
    let bonus = firstCheckInDone ? 15 : 25;
    xp += bonus;

    if(!firstCheckInDone){
        firstCheckInDone = true;
        localStorage.setItem("checkinDate", today);
    }

    showXP(`+${bonus} XP 📍`);
    addActivity("📍 Someone checked in");
    updateBar();
}

/* CONFIRM */
function confirmStatus(){
    xp += 5;
    showXP("+5 XP ✔️");
    updateBar();
}

/* REPORT */
async function report(i,status){
    let bar = bars[i];
    let bonus = getFirstReportBonus(bar);

    try{
        await supabaseClient.from("reports").insert([
            {bar: bar.name, status: status}
        ]);
    }catch(e){console.log(e);}

    let gained = 10 + bonus.xp;
    xp += gained;

    /* ownership */
    myBarReports[bar.name]=(myBarReports[bar.name]||0)+1;
    localStorage.setItem("myBarReports", JSON.stringify(myBarReports));

    totalReports++;
    localStorage.setItem("reports", totalReports);
    updateLeaderboardUI();

    showXP(`+${gained} XP ${bonus.label}`);

    /* 🔥 FEED EVENTS */
    if(bonus.xp === 50){
        addActivity(`🔥 First report at ${bar.name}`);
    } else if(bonus.xp === 25){
        addActivity(`⚡ ${bar.name} revived`);
    } else {
        addActivity(`📊 ${status} at ${bar.name}`);
    }

    updateBar();
    loadReports();
}

/* RENDER */
function renderBars(){
    let c=document.getElementById("line");
    c.innerHTML="";

    bars.forEach((bar,i)=>{
        let last = bar.reports[0]?.time || 0;

        let nudge="";
        if(bar.reports.length===0){
            nudge="🔥 Be first — big XP";
        } else if(Date.now()-last > 600000){
            nudge="⚠️ Needs update — bonus XP";
        }

        c.innerHTML+=`
        <div class="bar">
            <h3>${bar.name}</h3>
            <div style="font-size:12px;color:#444;">${getOwner(bar)}</div>
            <div class="status">${getStatus(bar)}</div>
            <div style="font-size:12px;color:#777;">
                Last updated: ${getLastUpdated(bar)}
            </div>
            <div style="color:#ff5722;font-size:12px;">${nudge}</div>

            <div class="buttons">
                <button onclick="report(${i},'Dead')">Dead</button>
                <button onclick="report(${i},'Busy')">Busy</button>
                <button onclick="report(${i},'Packed')">Packed</button>
                <button onclick="checkIn()">📍 I'm Here</button>
            </div>

            <div class="buttons">
                <button class="confirm-btn" onclick="confirmStatus()">Still Dead</button>
                <button class="confirm-btn" onclick="confirmStatus()">Still Busy</button>
                <button class="confirm-btn" onclick="confirmStatus()">Still Packed</button>
            </div>
        </div>`;
    });
}

/* LOAD */
async function loadReports(){
    try{
        const {data,error} = await supabaseClient
            .from("reports")
            .select("*")
            .order("created_at",{ascending:false});

        if(error){console.log(error);return;}

        bars.forEach(b=>b.reports=[]);

        data.forEach(r=>{
            let b = bars.find(x=>x.name===r.bar);
            if(b){
                b.reports.push({
                    status:r.status,
                    time:new Date(r.created_at).getTime()
                });
            }
        });

    }catch(e){console.log(e);}

    renderBars();
}

/* INIT */
window.onload=function(){
    renderBars();
    loadReports();
    updateLeaderboardUI();
    renderFeed();
};
</script>

</body>
</html>
